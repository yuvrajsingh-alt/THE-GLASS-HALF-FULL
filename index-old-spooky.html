<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour the Juice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive;
}

/* ── canvas ── */
#gc {
  position: relative;
  width: 100vw;
  max-width: calc(100vh * 16 / 9);
  aspect-ratio: 16 / 9;
  overflow: hidden;
  user-select: none;
}

/* ── full-scene background ── */
#bgFull {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── instruction text box (text box.png) ── */
#banner {
  position: absolute;
  top: -0.7%;
  left: 1.2%;
  width: 97.3%;
  aspect-ratio: 1869 / 186;   /* native ratio of text box.png */
  z-index: 20;
  pointer-events: none;
}
#bannerBg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
/* text sits in the purple bar, after the pumpkin avatar */
#bannerText {
  position: absolute;
  top: 18%; bottom: 14%;
  left: 10.5%; right: 6%;
  display: flex;
  align-items: center;
  color: #fff;
  font-size: 2.2vw;
  font-weight: 900;
  text-shadow: 2px 3px 6px rgba(0,0,0,0.55);
  line-height: 1.2;
  pointer-events: none;
}
/* blinking caret while the banner types */
#bannerText.typing::after {
  content: '|';
  color: #ffd700;
  animation: caretBlink 0.6s step-end infinite;
}

/* ── glass juice-fill overlay ──
   Positioned exactly over the glass in the background image.
   Tune left/top/width/height if assets shift. */
#glassFill {
  position: absolute;
  /* measured from maint.svg glass path: x 908.5-1010.6, y 723-890,
     inset slightly so juice stays inside the glass walls */
  left:   47.55%;
  top:    67.35%;
  width:  4.9%;
  height: 14.9%;
  z-index: 14;
  pointer-events: none;
  /* glass tapers: 102px wide at top → ~77px at bottom */
  clip-path: polygon(0% 0%, 100% 0%, 88% 99%, 12% 99%);
}

/* rising juice — slightly transparent so glass shine from BG shows through */
#juice {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 0%;
  background: linear-gradient(180deg, #ffb3c6 0%, #ff69b4 45%, #e91e8c 100%);
  opacity: 0.85;
  transition: height 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* wobbling juice surface */
#juiceWave {
  position: absolute;
  left: 4%; right: 4%;
  bottom: 0;           /* JS moves this with the fill level */
  height: 7%;
  background: #ffd1dc;
  border-radius: 50%;
  opacity: 0;
  transition: bottom 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s;
  animation: waveWobble 1.6s ease-in-out infinite;
}
@keyframes waveWobble {
  0%, 100% { transform: scaleX(1)    translateY(0);    }
  50%      { transform: scaleX(0.92) translateY(-12%); }
}

/* bubbles that rise while pouring */
.bubble {
  position: absolute;
  background: rgba(255,255,255,0.65);
  border-radius: 50%;
  pointer-events: none;
  animation: bubbleUp 0.9s ease-out forwards;
}
@keyframes bubbleUp {
  0%   { transform: translateY(0)      scale(0.6); opacity: 0.9; }
  100% { transform: translateY(-340%)  scale(1.1); opacity: 0;   }
}

/* ── juice stream (nozzle → glass) ── */
#stream {
  position: absolute;
  left: 49.95%;   /* aligned to glass center (x≈959 of 1920) */
  transform: translateX(-50%);
  top:    61%;
  width:  0.9%;
  height: 6%;
  background: linear-gradient(180deg, transparent 0%, #ff69b4 35%, #e91e8c 100%);
  border-radius: 8px;
  opacity: 0;
  z-index: 13;
  pointer-events: none;
  transition: opacity 0.15s;
}
/* flowing texture inside the stream */
#stream::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    rgba(255,255,255,0.35) 0px, rgba(255,255,255,0.35) 4px,
    transparent 4px, transparent 10px
  );
  border-radius: 8px;
  animation: streamFlow 0.3s linear infinite;
}
@keyframes streamFlow {
  0%   { background-position: 0 0;    }
  100% { background-position: 0 10px; }
}

/* ── POUR button (transparent hit-area over machine's POUR button) ── */
#pourBtn {
  position: absolute;
  left:    47.3%;  /* tune to match POUR button in machine image */
  top:     51.5%;
  width:   5.0%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  z-index: 25;
  transition: transform 0.12s, filter 0.12s;
}
#pourBtn::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 3px solid rgba(255,215,0,0);
  transition: border-color 0.2s, box-shadow 0.2s;
}
#pourBtn:not(:disabled):hover::after {
  border-color: rgba(255,215,0,0.8);
  box-shadow: 0 0 18px rgba(255,215,0,0.45);
}
#pourBtn:not(:disabled):hover { filter: brightness(1.3); }
#pourBtn.pressed { transform: scale(0.88); }
#pourBtn:disabled { cursor: not-allowed; opacity: 0.35; }

/* POUR pulse ring (tutorial) */
@keyframes pulseRing {
  0%   { transform: scale(0.85); opacity: 0.9; }
  100% { transform: scale(1.45); opacity: 0;   }
}
.pulse-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 4px solid #ffd700;
  animation: pulseRing 1.1s ease-out infinite;
  pointer-events: none;
}

/* ── Hand pointer ── */
#hand {
  position: absolute;
  font-size: 3.8vw;
  z-index: 40;
  pointer-events: none;
  display: none;
  animation: tapHand 1s ease-in-out infinite;
  /* placed over POUR button — JS sets left/top */
}
@keyframes tapHand {
  0%,100% { transform: translateY(0)   scale(1);    }
  50%      { transform: translateY(18%) scale(0.85); }
}

/* ── Check button ── */
#checkBtn {
  position: absolute;
  bottom: 2.5%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #9c27b0, #6a1b9a);
  color: #fff;
  font-size: 2.3vw;
  font-weight: 900;
  font-family: inherit;
  padding: 1.1% 5.5%;
  border-radius: 60px;
  border: 4px solid #ffd700;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(106,27,154,0.55);
  z-index: 25;
  display: none;
  letter-spacing: 1px;
  transition: transform 0.12s, box-shadow 0.12s, opacity 0.3s;
}
#checkBtn:not(:disabled):hover {
  transform: translateX(-50%) scale(1.07);
  box-shadow: 0 8px 28px rgba(106,27,154,0.7);
}
#checkBtn:not(:disabled):active { transform: translateX(-50%) scale(0.96); }
#checkBtn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Title screen (game thumbnail) ── */
#title {
  position: absolute;
  inset: 0;
  z-index: 70;
  cursor: pointer;
}
#title.leaving { animation: introOut 0.45s ease forwards; }
#titleImg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.playBtn {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #ffb300, #e65100);
  color: #fff;
  font-size: 2.6vw;
  font-weight: 900;
  font-family: inherit;
  padding: 1.2% 6%;
  border-radius: 60px;
  border: 4px solid #ffd700;
  cursor: pointer;
  box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 24px rgba(255,179,0,0.6);
  letter-spacing: 2px;
  animation: startPulse 1.4s ease-in-out infinite;
}

/* ── Intro: first screen (full-scene SVG) ── */
#intro {
  position: absolute;
  inset: 0;
  z-index: 60;
  animation: introFade 0.5s ease;
}
@keyframes introFade {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}
#intro.leaving { animation: introOut 0.45s ease forwards; }
@keyframes introOut {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}
#introScene {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* ── floating ghost (extracted from 1.seen.svg, rect 894,589 629x354) ── */
#ghost {
  position: absolute;
  left:   46.6%;
  top:    54.5%;
  width:  32.8%;
  height: 32.8%;
  object-fit: fill;
  pointer-events: none;
  animation: ghostFloat 3.2s ease-in-out infinite;
  transform-origin: center;
}
@keyframes ghostFloat {
  0%, 100% { transform: translateY(0)    rotate(0deg);   }
  25%      { transform: translateY(-3.5%) rotate(-1.5deg); }
  50%      { transform: translateY(-6%)  rotate(0deg);   }
  75%      { transform: translateY(-3.5%) rotate(1.5deg);  }
}

/* ── client 2: skeleton (client1.png, 312×384) ──
   placed exactly where he stands in client 1.svg (right of the counter),
   slides in then floats */
#intro.skeleton #ghost {
  left:   80.8%;
  top:    34.6%;
  width:  17.95%;
  height: auto;
  aspect-ratio: 312 / 384;
  object-fit: contain;
  animation: clientArrive 0.9s ease-out both,
             ghostFloat 3.2s ease-in-out 0.9s infinite;
}
/* counter strip from client 1.svg — drawn over the skeleton so he
   stands behind the counter while floating */
#introCounter {
  position: absolute;
  left:   0;
  top:    62.33%;
  width:  100%;
  height: 37.67%;
  object-fit: fill;
  display: none;
  pointer-events: none;
}
#intro.skeleton #introCounter { display: block; }

/* ── client 3: wolf (client 3.svg, 272×356) ──
   stands behind the counter on the right, like the skeleton */
#intro.wolf #ghost {
  left:   79.5%;
  top:    33%;
  width:  17.5%;
  height: auto;
  aspect-ratio: 272 / 356;
  object-fit: contain;
  animation: clientArrive 0.9s ease-out both,
             ghostFloat 3.2s ease-in-out 0.9s infinite;
}
#intro.wolf #introCounter { display: block; }

/* ── clients 4–6: mummy / vampire / goblin (stand behind the counter) ──
   sized by height so every character's head sits at a similar level */
#intro.mummy #ghost,
#intro.vampire #ghost,
#intro.goblin #ghost {
  left: auto;  top: auto;
  width: auto;
  object-fit: contain;
  animation: clientArrive 0.9s ease-out both,
             ghostFloat 3.2s ease-in-out 0.9s infinite;
}
#intro.mummy   #ghost { right: 7%; bottom: 12%; height: 64%; }
#intro.vampire #ghost { right: 8%; bottom: 4%;  height: 66%; }
#intro.goblin  #ghost { right: 8%; bottom: 4%;  height: 66%; }

#intro.mummy #introCounter,
#intro.vampire #introCounter,
#intro.goblin #introCounter { display: block; }

@keyframes clientArrive {
  0%   { transform: translateX(160%) translateY(3%) scale(0.85); opacity: 0; }
  55%  { opacity: 1; }
  100% { transform: translateX(0)    translateY(0)  scale(1);    opacity: 1; }
}

/* ── dialogue bubble (matches bubble in original SVG: 1314-1566, 470-643) ── */
#bubble {
  position: absolute;
  left:   68.4%;
  top:    43.5%;
  width:  13.2%;
  height: 16%;
  background: #fff;
  border-radius: 26px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 1% 1.2%;
  animation: bubblePop 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
/* tail pointing down-left toward the ghost */
#bubble::after {
  content: '';
  position: absolute;
  bottom: -7%;
  left: 8%;
  width: 0; height: 0;
  border: 0.9vw solid transparent;
  border-top: 1.4vw solid #fff;
  border-left-width: 0.2vw;
  transform: rotate(18deg);
}
@keyframes bubblePop {
  0%   { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
/* skeleton & wolf rounds: bubble sits up-left of the client,
   tail flips to point down-right toward him */
#intro.skeleton #bubble,
#intro.wolf #bubble,
#intro.mummy #bubble,
#intro.vampire #bubble,
#intro.goblin #bubble {
  left:  60.5%;
  top:   24%;
  width: 16%;
  animation-delay: 0.9s;       /* pops after the client arrives */
  animation-fill-mode: both;
}
#intro.skeleton #bubble::after,
#intro.wolf #bubble::after,
#intro.mummy #bubble::after,
#intro.vampire #bubble::after,
#intro.goblin #bubble::after {
  left: auto;
  right: 8%;
  transform: rotate(-18deg) scaleX(-1);
}
#bubbleText {
  font-size: 1.45vw;
  font-weight: 800;
  color: #4a148c;
  line-height: 1.35;
}
/* blinking caret while typing */
#bubbleText.typing::after {
  content: '|';
  color: #9c27b0;
  animation: caretBlink 0.6s step-end infinite;
}
@keyframes caretBlink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0; }
}
@keyframes startPulse {
  0%, 100% { transform: translateX(-50%) scale(1);    }
  50%      { transform: translateX(-50%) scale(1.07); }
}

/* ── Ending screen (ghost holding juice) ── */
#ending {
  position: absolute;
  inset: 0;
  z-index: 58;
  display: none;
}
#ending.showing { display: block; animation: introFade 0.6s ease; }
#endingImg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#endingMsg {
  position: absolute;
  top: 1.5%;
  left: 12%;
  right: 9%;
  height: 10%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 2.6vw;
  font-weight: 900;
  text-shadow: 2px 3px 8px rgba(0,0,0,0.7);
  pointer-events: none;
}
.playAgainBtn {
  position: absolute;
  bottom: 4%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #ffb300, #e65100);
  color: #fff;
  font-size: 2.3vw;
  font-weight: 900;
  font-family: inherit;
  padding: 1.2% 5.5%;
  border-radius: 60px;
  border: 4px solid #ffd700;
  cursor: pointer;
  box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 24px rgba(255,179,0,0.6);
  animation: startPulse 1.4s ease-in-out infinite;
}

/* ── Confetti ── */
#confetti {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 48;
  display: none;
}
.cp {
  position: absolute;
  width: 10px; height: 14px;
  border-radius: 2px;
  top: -20px;
  animation: cFall linear forwards;
}
@keyframes cFall {
  0%   { transform: translateY(0)     rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── Sparkles ── */
.sparkle {
  position: absolute;
  pointer-events: none;
  font-size: 2.8vw;
  z-index: 47;
  animation: sparkAnim 0.8s ease forwards;
}
@keyframes sparkAnim {
  0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
  60%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
  100% { transform: scale(0) rotate(360deg); opacity: 0; }
}

/* ── dragon helper (animated GIF, shown during pour time) ── */
#dragon {
  position: absolute;
  right:  0%;
  bottom: 11%;
  width:  31%;
  z-index: 12;
  pointer-events: none;
  opacity: 0;
  transform: translateX(45%);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4));
}
#dragon.show { opacity: 1; transform: translateX(0); }
#dragon.cheer { animation: dragonCheer 0.5s ease; }

/* counter front overlay — sits above the dragon (z 12) so he's behind the bar.
   Cropped from maint.svg's right counter section, aligned bottom-right. */
#counterFront {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 31.25%;
  z-index: 13;
  pointer-events: none;
}
@keyframes dragonCheer {
  0%, 100% { transform: translateX(0) translateY(0)   scale(1);    }
  45%      { transform: translateX(0) translateY(-7%) scale(1.06); }
}

/* shared */
@keyframes popIn {
  0%   { transform: scale(0.4); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
</style>
</head>
<body>
<div id="gc">

  <!-- ── full scene background (main game screen) ── -->
  <img id="bgFull" src="assets map/maint.svg" alt="">

  <!-- ── instruction text box (text box.png + typewriter text) ── -->
  <div id="banner">
    <img id="bannerBg" src="assets map/text box.png" alt="">
    <div id="bannerText"></div>
  </div>

  <!-- ── glass juice fill (overlaid on the glass in the background) ── -->
  <div id="glassFill">
    <div id="juice"></div>
    <div id="juiceWave"></div>
  </div>

  <!-- ── juice stream from nozzle ── -->
  <div id="stream"></div>

  <!-- ── dragon helper (animated GIF, appears during pour time) ── -->
  <img id="dragon" src="assets map/sprite-max-px-frames-36-rows-6-cols-6 (1).gif" alt="">

  <!-- ── counter front (right section of the bar) drawn OVER the dragon
       so he stands behind the counter ── -->
  <img id="counterFront" src="assets map/counter-overlay.png" alt="">

  <!-- ── POUR button (transparent, sits over the machine's POUR button) ── -->
  <button id="pourBtn" onclick="pour()" aria-label="Pour juice"></button>

  <!-- ── hand tutorial pointer ── -->
  <div id="hand" style="left:48%;top:56%;">👆</div>

  <!-- ── check button ── -->
  <button id="checkBtn" onclick="check()">✓  Check!</button>

  <!-- ── ending screen: client got its juice ── -->
  <div id="ending">
    <img id="endingImg" src="assets map/ghost,glass.png" alt="">
    <div id="endingMsg">Thank you! Yummy juice! 🧃✨</div>
    <button class="playAgainBtn" id="nextBtn" onclick="nextRound()">Next Client ➜</button>
  </div>

  <!-- ── confetti ── -->
  <div id="confetti"></div>

  <!-- ── title screen (game thumbnail — very first screen) ── -->
  <div id="title" onclick="leaveTitle()">
    <img id="titleImg" src="assets map/game thumbnail.png" alt="The Glass Half Full">
    <button class="playBtn" id="playBtn">▶ PLAY</button>
  </div>

  <!-- ── intro: first screen (scene + animated client + dialogue) ── -->
  <div id="intro">
    <img id="introScene" src="assets map/intro-bg.png" alt="">
    <img id="ghost" src="assets map/ghost.png" alt="">
    <img id="introCounter" src="assets map/client1-counter.png" alt="">
    <div id="bubble"><span id="bubbleText"></span></div>
  </div>

</div>

<script>
// ── config ──────────────────────────────────────────────────
const ROUNDS = [
  { target:'half', label:'HALF FULL', ask:'I want a Half Full glass of juice! 🧃',
    client:'assets map/ghost.png',    scene:'assets map/intro-bg.png',      skin:'',
    ending:'assets map/ghost,glass.png' },
  { target:'full', label:'FULL',      ask:'I want a FULL glass of juice. 🧃',
    client:'assets map/client1.png',  scene:'assets map/client1-scene.png', skin:'skeleton',
    ending:'assets map/client 1.svg' },
  { target:'half', label:'HALF FULL', ask:'i want half glass',
    client:'assets map/client 3.svg', scene:'assets map/client1-scene.png', skin:'wolf',
    ending:'assets map/wolf-client.png' },
  { target:'full', label:'FULL',      ask:'I want a FULL glass of juice! 🧃',
    client:'assets map/client4-sprite.png', scene:'assets map/client1-scene.png', skin:'mummy',
    ending:'assets map/mummy-client.png' },
  { target:'half', label:'HALF FULL', ask:'I want a HALF glass of juice, please. 🧛',
    client:'assets map/client5-sprite.png', scene:'assets map/client1-scene.png', skin:'vampire',
    ending:'assets map/vampire-client.png' },
  { target:'full', label:'FULL',      ask:'Fill it up FULL for me! 🧃',
    client:'assets map/client6-sprite.png', scene:'assets map/client1-scene.png', skin:'goblin',
    ending:'assets map/goblin-client.png' }
];

// Juice fill levels (as % of glass height, 0 = empty, 100 = full)
const STEP      = 50;   // % per tap — 1 tap = half full, 2 taps = full
const HALF_MIN  = 42;   const HALF_MAX  = 58;   // tolerance for "half"
const FULL_MIN  = 88;                            // minimum to count as "full"

// ── state ────────────────────────────────────────────────────
let level      = 0;   // round 1: ghost (half) → round 2: skeleton (full)
let fillPct    = 0;
let hasPoured  = false;
let phase      = 'intro';   // intro | play | done
let tutStep    = 0;

// ── DOM ───────────────────────────────────────────────────────
const pourBtn   = document.getElementById('pourBtn');
const checkBtn  = document.getElementById('checkBtn');
const bannerTxt = document.getElementById('bannerText');
const handEl    = document.getElementById('hand');
const confetti  = document.getElementById('confetti');
const introEl   = document.getElementById('intro');
const bubbleTxt = document.getElementById('bubbleText');
const stream    = document.getElementById('stream');
const bgFull    = document.getElementById('bgFull');
const dragonEl  = document.getElementById('dragon');

// ── sounds ──
const pourSound  = new Audio('sxf/gana.mp3');         // plays while pouring
const wrongSound = new Audio('sxf/worng.mp3');        // plays on a wrong answer
const halfSound  = new Audio('sxf/fir wo hi bat.mp3'); // plays when a client asks for a half glass
pourSound.preload  = 'auto';
wrongSound.preload = 'auto';
halfSound.preload  = 'auto';
function playSound(snd) {
  try { snd.currentTime = 0; snd.play().catch(() => {}); } catch (e) {}
}
function playPourSound()  { playSound(pourSound);  }
function playWrongSound() { playSound(wrongSound); }
function playHalfSound()  { playSound(halfSound);  }

// ── init ──────────────────────────────────────────────────────
function initRound() {
  const r = ROUNDS[level];
  fillPct   = 0;
  hasPoured = false;
  phase     = 'intro';
  tutStep   = 0;

  setJuice(0);
  checkBtn.style.display  = 'none';
  checkBtn.disabled       = true;
  confetti.style.display  = 'none';
  confetti.innerHTML      = '';
  hideSpeech();
  pourBtn.disabled        = false;
  removePulse();
  handEl.style.display    = 'none';
  dragonEl.classList.remove('show', 'cheer');

  clearInterval(bannerTimer);
  bannerTxt.textContent   = '';

  // swap in this round's scene + client (ghost or skeleton)
  document.getElementById('introScene').src = r.scene;
  document.getElementById('ghost').src      = r.client;
  introEl.classList.remove('skeleton', 'wolf', 'mummy', 'vampire', 'goblin');
  if (r.skin) introEl.classList.add(r.skin);
  bubbleTxt.textContent = '';

  introEl.classList.remove('leaving');
  introEl.style.display   = 'block';
  // skeleton slides in first (0.9s), then his dialogue types
  if (titleDone) setTimeout(() => typeBubble(r.ask), r.skin ? 1000 : 0);
}

// ── title screen ──────────────────────────────────────────────
let titleDone = false;

function leaveTitle() {
  if (titleDone) return;
  titleDone = true;
  const t = document.getElementById('title');
  t.classList.add('leaving');
  setTimeout(() => { t.style.display = 'none'; }, 430);
  // start the client's dialogue once the intro scene is revealed
  // (skeleton slides in first, so his dialogue waits a bit longer)
  setTimeout(() => typeBubble(ROUNDS[level].ask), ROUNDS[level].skin ? 1400 : 500);
}

// ── banner typewriter (instruction text box) ──────────────────
let bannerTimer = null;

function typeBanner(text, onDone) {
  clearInterval(bannerTimer);
  bannerTxt.textContent = '';
  bannerTxt.classList.add('typing');
  let i = 0;
  bannerTimer = setInterval(() => {
    i++;
    bannerTxt.textContent = text.slice(0, i);
    if (i >= text.length) {
      clearInterval(bannerTimer);
      bannerTxt.classList.remove('typing');
      if (onDone) onDone();
    }
  }, 40);
}

// ── typewriter dialogue ───────────────────────────────────────
let typeTimer = null;

function typeBubble(text) {
  clearInterval(typeTimer);
  // half-glass clients get their voice line as they ask
  if (ROUNDS[level].target === 'half') playHalfSound();
  bubbleTxt.textContent = '';
  bubbleTxt.classList.add('typing');
  let i = 0;
  typeTimer = setInterval(() => {
    i++;
    bubbleTxt.textContent = text.slice(0, i);
    if (i >= text.length) {
      clearInterval(typeTimer);
      bubbleTxt.classList.remove('typing');
      // dialogue finished — auto-advance to the game after a short pause
      setTimeout(startGame, 1400);
    }
  }, 55);
}

// ── start ──────────────────────────────────────────────────────
function startGame() {
  if (phase !== 'intro') return;
  clearInterval(typeTimer);
  introEl.classList.add('leaving');
  setTimeout(() => { introEl.style.display = 'none'; }, 430);
  phase                  = 'play';
  checkBtn.style.display = 'block';
  checkBtn.disabled      = true;
  dragonEl.classList.add('show');   // dragon waves in for pour time

  // scripted flow: task line, then the tap instruction
  setTimeout(() => {
    typeBanner(`Pour a ${ROUNDS[level].label} glass of juice.`, () => {
      setTimeout(() => {
        typeBanner('Tap the button to pour the juice.');
        addPulse();
        handEl.style.display = 'block';
      }, 900);
    });
  }, 700);
}

// ── pour ──────────────────────────────────────────────────────
function pour() {
  if (pourBtn.disabled || phase !== 'play') return;

  const r   = ROUNDS[level];
  const cap = r.target === 'half' ? 50 : 100;

  if (fillPct >= cap) return;

  hasPoured = true;
  checkBtn.disabled = false;
  removePulse();
  handEl.style.display = 'none';

  pourBtn.classList.add('pressed');
  setTimeout(() => pourBtn.classList.remove('pressed'), 140);

  // pour sound
  playPourSound();

  // stream flash + bubbles
  stream.style.opacity = '1';
  setTimeout(() => { stream.style.opacity = '0'; }, 480);
  spawnBubbles();

  // dragon does a little cheer each time you pour
  dragonEl.classList.remove('cheer');
  void dragonEl.offsetWidth;        // restart the animation
  dragonEl.classList.add('cheer');

  fillPct = Math.min(fillPct + STEP, cap);
  setJuice(fillPct);

  tutStep++;
  afterPour(r);

  if (fillPct >= cap) pourBtn.disabled = true;
}

function afterPour(r) {
  if (r.target === 'full') {
    // scripted flow: tap1 → tap again, tap2 → half full,
    // tap3 → tap again, tap4 (full) → tap on Check
    if (fillPct >= FULL_MIN) {
      typeBanner('Tap on the Check button.');
    } else if (fillPct >= 48 && fillPct <= 52) {
      typeBanner('The glass is now half full.');
    } else {
      typeBanner('Tap again to pour more juice.');
    }
  } else {
    if (fillPct >= 50) {
      typeBanner('The glass is now half full. Tap on the Check button.');
      pourBtn.disabled = true;
    } else {
      typeBanner('Tap again to pour more juice.');
    }
  }
}

// ── set juice level ───────────────────────────────────────────
const juiceEl = document.getElementById('juice');
const waveEl  = document.getElementById('juiceWave');

function setJuice(pct) {
  // juice occupies up to 94% of glass interior (leaves rim space at top)
  const h = pct * 0.94;
  juiceEl.style.height = h + '%';
  waveEl.style.bottom  = Math.max(h - 3, 0) + '%';
  waveEl.style.opacity = pct > 0 ? '0.9' : '0';
}

// bubbles rising inside the juice while pouring
function spawnBubbles() {
  const glass = document.getElementById('glassFill');
  for (let i = 0; i < 4; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 8 + Math.random() * 14; // % of glass width
    b.style.width  = size + '%';
    b.style.aspectRatio = '1';
    b.style.left   = (15 + Math.random() * 60) + '%';
    b.style.bottom = (6 + Math.random() * 20) + '%';
    b.style.animationDelay = (Math.random() * 0.25) + 's';
    glass.appendChild(b);
    setTimeout(() => b.remove(), 1300);
  }
}

// ── check ─────────────────────────────────────────────────────
function check() {
  if (!hasPoured || phase !== 'play') return;
  phase = 'done';
  checkBtn.disabled = true;
  pourBtn.disabled  = true;
  handEl.style.display = 'none';
  hideSpeech();
  hideHint();

  const r       = ROUNDS[level];
  const correct = r.target === 'half'
    ? fillPct >= HALF_MIN && fillPct <= HALF_MAX
    : fillPct >= FULL_MIN;

  correct ? onSuccess(r) : onFail(r);
}

// ── success ────────────────────────────────────────────────────
function onSuccess(r) {
  const msg = r.target === 'full'
    ? 'Yay! You poured a full glass. 🎉'
    : 'Yay! You poured a Half Full glass. 🎉';

  typeBanner(msg);
  launchConfetti();
  launchSparkles();

  // after the celebration, show the ending screen for this client
  const endingImg = document.getElementById('endingImg');
  const nextBtn   = document.getElementById('nextBtn');
  const isLast    = level === ROUNDS.length - 1;

  endingImg.src       = r.ending;
  nextBtn.textContent = isLast ? 'Play Again! 🔄' : 'Next Client ➜';

  setTimeout(() => {
    document.getElementById('ending').classList.add('showing');
  }, 2600);
}

// ── fail ───────────────────────────────────────────────────────
function onFail(r) {
  const msg = r.target === 'full'
    ? 'Uh-oh! Is the glass Full? 🤔'
    : 'Uh-oh! Is the glass Half Full? 🤔';

  playWrongSound();
  typeBanner(msg);

  // auto-reset so the learner can try again
  setTimeout(tryAgain, 2200);
}

// ── try again ──────────────────────────────────────────────────
function tryAgain() {
  fillPct   = 0;
  hasPoured = false;
  phase     = 'play';
  tutStep   = 0;
  setJuice(0);
  pourBtn.disabled  = false;
  checkBtn.disabled = true;
  hideHint();
  typeBanner('Tap the button to pour the juice.');
  addPulse();
  handEl.style.display = 'block';
}

// ── next round ─────────────────────────────────────────────────
function nextRound() {
  document.getElementById('ending').classList.remove('showing');
  level = (level + 1) % ROUNDS.length;
  initRound();
}

// ── helpers ────────────────────────────────────────────────────
// guidance messages are typed into the text box banner
function showSpeech(t) { typeBanner(t); }
function hideSpeech()  {}
// hint badge removed — no-ops kept for call sites
function showHint()    {}
function hideHint()    {}

function addPulse() {
  if (pourBtn.querySelector('.pulse-ring')) return;
  const r = document.createElement('div');
  r.className = 'pulse-ring';
  pourBtn.appendChild(r);
}
function removePulse() {
  const r = pourBtn.querySelector('.pulse-ring');
  if (r) r.remove();
}

// ── confetti ───────────────────────────────────────────────────
function launchConfetti() {
  confetti.style.display = 'block';
  confetti.innerHTML = '';
  const cols = ['#ffd700','#ff69b4','#00e5ff','#76ff03','#ff6d00','#ea80fc','#fff'];
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}%;background:${cols[i%cols.length]};`
      + `animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*0.9}s;`
      + `width:${7+Math.random()*7}px;height:${10+Math.random()*7}px;transform:rotate(${Math.random()*360}deg)`;
    confetti.appendChild(p);
  }
  setTimeout(() => { confetti.style.display = 'none'; confetti.innerHTML = ''; }, 4500);
}

// ── sparkles ───────────────────────────────────────────────────
function launchSparkles() {
  const pos = [
    {top:'18%',left:'18%'},{top:'22%',left:'68%'},{top:'48%',left:'14%'},
    {top:'52%',left:'78%'},{top:'32%',left:'48%'},{top:'14%',left:'42%'},
    {top:'58%',left:'32%'},{top:'28%',left:'82%'},{top:'40%',left:'60%'}
  ];
  const icons = ['✨','⭐','💫','🌟','🎉'];
  const gc = document.getElementById('gc');
  pos.forEach((p,i) => {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = icons[i % icons.length];
    s.style.top  = p.top;
    s.style.left = p.left;
    s.style.animationDelay = (i * 0.11) + 's';
    gc.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  });
}

// ── boot ───────────────────────────────────────────────────────
initRound();
</script>
