<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pour the Juice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* nothing in the game may be drag-copied or selected — the glass uses its own
   pointer-based drag (see .servedSet), which is unaffected by this. */
img, svg, button {
  -webkit-user-drag: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  background: #15071f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
}

/* ── canvas (16:9, design space 1920×1080) ── */
#gc {
  position: relative;
  /* the largest 16:9 rectangle that fits the viewport on BOTH axes, centred by
     the fl​ex body → letterboxes on tall screens, pillarboxes on wide screens */
  width: min(100vw, calc(100vh * 16 / 9));
  height: min(56.25vw, 100vh);
  aspect-ratio: 16 / 9;
  overflow: hidden;
  user-select: none;
  /* make the board a query container so every inner size that uses `cqw`
     scales with the BOARD width, not the viewport width. This keeps the whole
     layout consistent on ultra-wide, short-landscape and pillarboxed screens
     where the board no longer spans the full viewport width. */
  container-type: inline-size;
}

/* ── rotate-to-landscape prompt (shown on portrait screens; the game is 16:9) ── */
#rotate { display: none; }
@media (orientation: portrait) {
  #rotate {
    display: flex;
    position: fixed; inset: 0;
    z-index: 100000;              /* above everything, incl. the dev menu */
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: #15071f;
    color: #ffeede;
    padding: 8vw;
    font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  }
  #rotate .ico { font-size: 20vw; line-height: 1; animation: rotateHint 2s ease-in-out infinite; }
  #rotate p { margin-top: 6vw; font-size: clamp(15px, 4.6vw, 30px); font-weight: 700; width: 84vw; }
}
@keyframes rotateHint { 0%,20% { transform: rotate(0deg); } 60%,100% { transform: rotate(90deg); } }

/* ── full-scene circus background (GAME BG.svg) ── */
#bgFull {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ════════════════════════════════════════════════════════════
   All element positions are expressed as % of the 1920×1080
   design, taken straight from the Figma frame (660:6204).
   Tweak any value here if an asset needs nudging.
   ════════════════════════════════════════════════════════════ */

/* ── client (monster standing behind the counter) ── */
#client {
  position: absolute;
  left: 55%;                  /* center-stage, between the machine and the dragon host */
  bottom: 42%;                /* lower body tucks behind the counter overlay */
  width: 12.8%;               /* uniform footprint — every customer is the same size */
  height: 40%;
  transform: translateX(-50%);
  object-fit: contain;        /* scale each character to fit the box, undistorted */
  z-index: 3;                 /* behind #counterFront (z4) so it stands behind the bar */
  pointer-events: none;
  opacity: 0;                 /* hidden until it walks in */
  filter: drop-shadow(0 10px 16px rgba(0,0,0,0.45));
  transform-origin: center bottom;
}
/* the client walks in from the right, then floats in place */
#client.arriving, #client2.arriving, #client3.arriving {
  opacity: 1;
  animation: ghostWalkIn 2.8s ease-out both,
             clientFloat 3.2s ease-in-out 2.8s infinite;
}
#client.cheer { animation: clientCheer 0.6s ease; }
@keyframes clientFloat {
  0%,100% { transform: translateX(-50%) translateY(0);     }
  50%     { transform: translateX(-50%) translateY(-2.5%); }
}
/* right-to-left entrance with a little walking bob + sway */
@keyframes ghostWalkIn {
  0%   { transform: translateX(520%) translateY(0)   rotate(0deg);  opacity: 0; }
  12%  { opacity: 1; }
  30%  { transform: translateX(330%) translateY(-5%) rotate(-3deg); }
  45%  { transform: translateX(210%) translateY(0)   rotate(3deg);  }
  60%  { transform: translateX(110%) translateY(-5%) rotate(-3deg); }
  78%  { transform: translateX(20%)  translateY(0)   rotate(2deg);  }
  90%  { transform: translateX(-60%) translateY(-3%) rotate(-1deg); }
  100% { transform: translateX(-50%) translateY(0)   rotate(0deg);  opacity: 1; }
}
@keyframes clientCheer {
  0%,100% { transform: translateX(-50%) translateY(0)   scale(1);    }
  45%     { transform: translateX(-50%) translateY(-8%) scale(1.07); }
}
/* happy customer floats out to the left and off the frame */
#client.leavingLeft, #client2.leavingLeft, #client3.leavingLeft { opacity: 1; animation: clientExitLeft 1s ease-in both; }
@keyframes clientExitLeft {
  0%   { transform: translateX(-50%)  translateY(0);   opacity: 1; }
  100% { transform: translateX(-720%) translateY(-3%); opacity: 0; }
}

/* ── extra customer slots (post-tutorial: up to 3 customers at once) ── */
#client2, #client3 {
  position: absolute;
  left: 70%;
  bottom: 42%;
  width: 12.8%;               /* same uniform footprint as #client */
  height: 40%;
  transform: translateX(-50%);
  object-fit: contain;
  z-index: 3;                 /* behind the counter, like #client */
  pointer-events: none;
  opacity: 0;
  display: none;
  filter: drop-shadow(0 10px 16px rgba(0,0,0,0.45));
  transform-origin: center bottom;
}

/* all customer slots: standing idle float, cheer, poof */
#client.standing, #client2.standing, #client3.standing { opacity: 1; animation: clientFloat 3.2s ease-in-out infinite; }
#client2.cheer, #client3.cheer { animation: clientCheer 0.6s ease; }
#client.poof, #client2.poof, #client3.poof { animation: clientPoof 0.85s ease-in forwards; }
@keyframes clientPoof {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);    }
  40%  { opacity: 1; transform: translateX(-50%) translateY(-6%)  scale(1.08); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-14%) scale(0.85); }
}

/* counter frame (new counter.png) — a full-screen foreground overlay with a transparent
   window: customers + sky show through it, and its opaque counter bar hides their lower body.
   The art's ledge sits at ~49% but the scene's counter line is at ~52.3%, so the image is
   stretched slightly taller (top-anchored: curtains stay put, ledge drops onto the counter
   line, extra floor is cropped below the board). Tune `height` to nudge the ledge. */
#counterFront {
  position: absolute;
  left: 0;
  top: -2.5%;                 /* raised above natural — ledge ≈ 46.5% (curtains rise slightly too) */
  width: 100%;
  height: 102.5%;             /* keeps the floor reaching the bottom edge of the board */
  object-fit: fill;
  z-index: 4;
  pointer-events: none;
}

/* ── dragon host (agni) — permanent narrator, bottom-right behind the bar ── */
#dragon {
  position: absolute;
  left: 68.44%;
  top: 33.11%;
  width: 59.02%;
  height: 78.46%;
  object-fit: contain;
  z-index: 9;                 /* in front of the counter (z4) — stands beside the bar, fully visible */
  pointer-events: none;
  transform-origin: center bottom;
  transition: left 0.6s ease, top 0.6s ease, width 0.6s ease;
}
/* welcome intro — dragon stands centre-stage, then moves to its corner */
#dragon.intro { left: 34%; top: 35%; }
/* end of tutorial — the dragon host slides off to the right, then is removed */
#dragon.exitRight { animation: dragonExitRight 1s ease-in forwards; }
@keyframes dragonExitRight {
  0%   { transform: translateX(0)    rotate(0deg); opacity: 1; }
  100% { transform: translateX(115%) rotate(8deg); opacity: 0; }
}
/* mid-game hint (2+ wrong Check attempts): the dragon briefly slides back in
   to its resting spot to give a pour-count tip, then leaves again via .exitRight */
#dragon.hintIn { animation: dragonHintIn 0.8s ease-out both; }
@keyframes dragonHintIn {
  0%   { transform: translateX(115%) rotate(8deg); opacity: 0; }
  100% { transform: translateX(0)    rotate(0deg); opacity: 1; }
}

/* ── dragon's speech bubble (CSS-drawn so it sizes cleanly to any text) ── */
#dragonBubble {
  position: absolute;
  left: 86.83%;                /* anchored by centre so the bubble stays put as text changes */
  top: 21.67%;
  transform: translateX(-50%);
  transition: left 0.6s ease, top 0.6s ease;
  width: max-content;          /* hug the text … */
  max-width: 19%;              /* … up to a sensible cap, then wrap onto more lines */
  background: #fbe9cf;         /* peach fill */
  border: 0.5cqw solid #FE9200; /* thicker orange outline */
  border-radius: 1.1cqw;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.1em 1.3em;        /* inner padding on all sides */
  z-index: 16;
  pointer-events: none;
  color: #2a2a2a;
  font-weight: 600;
  font-size: 1.35cqw;
  line-height: 1.28;
  text-align: center;
  word-break: normal;
  overflow-wrap: break-word;
}
#dragonBubble.show { display: flex; animation: bubbleFade 0.25s ease; }
/* welcome intro — bubble sits above the centre-stage dragon */
#dragonBubble.introPos { left: 55%; top: 22%; }
@keyframes bubbleFade { from { opacity: 0; transform: translateX(-50%) scale(0.92); }
                          to { opacity: 1; transform: translateX(-50%) scale(1); } }
/* little tail pointing down toward the dragon (orange rim + peach fill) */
#dragonBubble::before, #dragonBubble::after {
  content: '';
  position: absolute;          /* absolute → not a flex item, won't shift the text */
  top: 100%;
  left: 58%;                   /* tail points down toward the dragon (below-right) */
  width: 0; height: 0;
  border: 0.95cqw solid transparent;
}
#dragonBubble::before { transform: translateX(-50%);              border-top-color: #FE9200; }
#dragonBubble::after  { transform: translateX(-50%) translateY(-0.3cqw); border-width: 0.72cqw; border-top-color: #fbe9cf; }
#dragonText.typing::after {
  content: '|';
  color: #fbe9cf;
  animation: caretBlink 0.6s step-end infinite;
}
/* the not-yet-typed tail stays in the layout (just invisible) so the bubble
   reserves its final size from the first character and never resizes mid-type */
#dragonText .untyped { visibility: hidden; }
/* emphasised words inside the dragon's bubble (empty glass / half full / full) */
#dragonText b { font-weight: 800; }

/* ── thought bubble (the client's order) — uses dailoge box.svg ── */
#thought {
  position: absolute;
  left: 45.5%;                /* TUTORIAL position (customer mode overrides this via QUEUE_POS inline styles) */
  top: 9.5%;                  /* floats just above the customer's head — close, but no overlap with the face */
  width: 7.27%;
  aspect-ratio: 281 / 382;
  display: none;
  z-index: 16;
}
#thought.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1), thoughtFloat 2.8s ease-in-out 0.4s infinite; }
@keyframes thoughtFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3.5%); } }
#thoughtBg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3));
}
/* the order bubble glows while the dragon says "This customer wants a full glass." */
#thought.glow #thoughtBg { animation: thoughtGlow 0.9s ease-in-out infinite; }
@keyframes thoughtGlow {
  0%,100% { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3)) drop-shadow(0 0 6px rgba(255,215,0,0.6)); }
  50%     { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3)) drop-shadow(0 0 22px rgba(255,215,0,1)); }
}
/* content sits inside the rounded box (top-left 82.6% × 85.9% of the svg) */
#thoughtInner {
  position: absolute;
  left: 0; top: 0;
  width: 82.6%; height: 85.9%;
  display: flex;
  flex-direction: column;
  align-items: center;       /* glass + label horizontally centered */
  justify-content: center;   /* …and the group vertically centered */
  text-align: center;
  padding: 6%;
  gap: 3%;
  font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  font-weight: 500;          /* Poppins Medium for the customer's order text */
}
@keyframes popIn {
  0%   { transform: scale(0);   opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}

/* ── extra order bubbles (customer slots 2 & 3) — IDENTICAL to #thought ── */
#thought2, #thought3 {
  position: absolute;
  left: 63%;                  /* overridden per-lane by QUEUE_POS in customer mode */
  top: 9.5%;                  /* same as #thought → all dialogue boxes sit at one height */
  width: 7.27%;
  aspect-ratio: 281 / 382;
  display: none;
  z-index: 16;
}
#thought2.show, #thought3.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1), thoughtFloat 2.8s ease-in-out 0.4s infinite; }
#thoughtBg2, #thoughtBg3 {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3));
}
/* same attention-glow as #thought — used for the 2+ wrong-Check hint in customer mode */
#thought2.glow #thoughtBg2, #thought3.glow #thoughtBg3 { animation: thoughtGlow 0.9s ease-in-out infinite; }
#thoughtInner2, #thoughtInner3 {
  position: absolute;
  left: 0; top: 0;
  width: 82.6%; height: 85.9%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6%;
  gap: 3%;
  font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  font-weight: 500;          /* Poppins Medium for the customer's order text */
}

@keyframes caretBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ── pink pour machine (left) ── */
#machine {
  position: absolute;
  left: 9.51%;
  top: 25.89%;
  width: 28.22%;
  height: 72.16%;
  object-fit: contain;
  z-index: 5;
  pointer-events: none;
  filter: drop-shadow(0 12px 20px rgba(0,0,0,0.4));
}
#machine.shake { animation: machineShake 0.4s ease; }
@keyframes machineShake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-1.2%) rotate(-0.6deg); }
  75%     { transform: translateX(1.2%)  rotate(0.6deg);  }
}

/* ── glass (sits in the machine's dispensing slot) ── */
#glass {
  position: absolute;
  left: 20.24%;       /* centered under the machine spout */
  top: 76.79%;
  width: 6.7%;
  height: 15.2%;
  z-index: 6;
  pointer-events: none;
}
/* tutorial highlight — empty glass pulses with a golden glow */
#glass.glow { animation: glassGlow 0.9s ease-in-out infinite; transform-origin: center bottom; }
@keyframes glassGlow {
  0%,100% { filter: drop-shadow(0 0 4px rgba(255,215,0,0.55)); transform: scale(1); }
  50%     { filter: drop-shadow(0 0 18px rgba(255,215,0,1)) drop-shadow(0 0 9px rgba(255,215,0,0.9)); transform: scale(1.06); }
}
/* wrong answer — glass glows red and shakes */
#glass.wrong {
  animation: glassShake 0.5s ease-in-out;   /* shake only — no red glow */
}
@keyframes glassShake {
  0%,100% { transform: translateX(0)    rotate(0deg);    }
  18%     { transform: translateX(-7px) rotate(-2.5deg); }
  36%     { transform: translateX(7px)  rotate(2.5deg);  }
  54%     { transform: translateX(-5px) rotate(-1.5deg); }
  72%     { transform: translateX(5px)  rotate(1.5deg);  }
  88%     { transform: translateX(-2px) rotate(0deg);    }
}
/* smooth rising liquid */
#fillRect { transition: y 0.75s cubic-bezier(0.25,0.46,0.45,0.94); }

/* the rising pink liquid is now handled inside the glass SVG (fillRect clip) */

/* a served glass clone that flies onto the tray on a correct answer */
/* the served drink (glass + straw + lemon) — flies to the tray, then is draggable to the customer */
.servedSet {
  position: absolute;
  width: 6.7%;
  height: 12.2%;
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 10px 16px rgba(0,0,0,0.45));
  transform-origin: center bottom;
  transition: left 0.85s cubic-bezier(0.34,1.05,0.5,1),
              top  0.85s cubic-bezier(0.5,-0.25,0.6,1);
}
.servedSet .glassImg { position: absolute; inset: 0; width: 100%; height: 100%; }
.servedSet.draggable { pointer-events: auto; cursor: grab; z-index: 30; touch-action: none; }
.servedSet.draggable:active { cursor: grabbing; }
.servedSet.hintBob { animation: hintBob 1s ease-in-out infinite; }
@keyframes hintBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7%); } }
/* wrong delivery (drink given to the wrong client): no red glow — the drink snaps back
   and gives a gentle wiggle as soft "try again" feedback */
.servedSet.wiggle { animation: servedWiggle 0.5s ease; }
@keyframes servedWiggle {
  0%,100% { transform: translate(0,0) rotate(0deg);  }
  15%     { transform: translate(-5%,0) rotate(-5deg); }
  30%     { transform: translate(5%,0)  rotate(5deg);  }
  45%     { transform: translate(-4%,0) rotate(-4deg); }
  60%     { transform: translate(4%,0)  rotate(3deg);  }
  75%     { transform: translate(-2%,0) rotate(-1.5deg); }
}

/* drag hint: a faint clone of the finished glass drifts toward the customer,
   showing the drink being "guided forward" (replaces the hand gesture) */
.servedSet.dragGhost {
  pointer-events: none;
  z-index: 11;                 /* just behind the real, grabbable glass (z30) */
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.25));
  animation: dragGhost 1.8s ease-in-out infinite;
  will-change: transform, opacity;
}
@keyframes dragGhost {
  0%        { transform: translate(0,0)        scale(1);    opacity: 0;    }
  12%       { transform: translate(-5%,-12%)   scale(0.97); opacity: 0.5;  }
  65%       { transform: translate(-44%,-140%) scale(0.8);  opacity: 0.3;  }
  85%,100%  { transform: translate(-52%,-165%) scale(0.72); opacity: 0;    }
}

/* ── juice stream (nozzle → glass) — flowing liquid column ── */
#stream {
  position: absolute;
  left: 23.59%;       /* aligned to the spout center */
  transform: translateX(-50%);
  top: 74%;
  width: 0.58%;
  height: 16%;
  background: linear-gradient(180deg, rgba(247,122,222,0) 0%, #F77ADE 22%, #F77ADE 100%);
  border-radius: 0 0 50% 50% / 0 0 14% 14%;
  opacity: 0;
  z-index: 9;
  pointer-events: none;
  transform-origin: top center;
}
/* one smooth, gentle pour — fade + grow, no wobble */
#stream.pouring { animation: streamPour 0.9s cubic-bezier(0.33, 0, 0.2, 1) both; }
@keyframes streamPour {
  0%   { opacity: 0; transform: translateX(-50%) scaleY(0.25); }
  30%  { opacity: 1; transform: translateX(-50%) scaleY(1);    }
  75%  { opacity: 1; transform: translateX(-50%) scaleY(1);    }
  100% { opacity: 0; transform: translateX(-50%) scaleY(1);    }
}

/* splash droplets where the stream hits the juice (same #F77ADE) */
.splash {
  position: absolute;
  background: #F77ADE;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9;
  animation: splashUp 0.55s cubic-bezier(0.33, 0, 0.2, 1) forwards;
}
@keyframes splashUp {
  0%   { transform: translate(0,0)               scale(0.5); opacity: 0.95; }
  60%  { opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
}

/* ── counter props ── */
#strawBox {
  position: absolute;
  left: 45.5%;
  top: 57.3%;
  width: 15.9%;
  z-index: 7;
  pointer-events: none;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
  transition: transform 0.15s;
}
/* straw box pulses to invite a tap once the glass is served */
#strawBox.glow {
  cursor: pointer;
  animation: boxGlow 0.9s ease-in-out infinite;
}
#strawBox.glow:hover { transform: scale(1.08); }
@keyframes boxGlow {
  0%,100% { filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35)) drop-shadow(0 0 0 rgba(255,215,0,0));    transform: scale(1);    }
  50%     { filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35)) drop-shadow(0 0 20px rgba(255,215,0,0.95)); transform: scale(1.06); }
}
/* a straw that drops into the served glass (positioned within the .servedSet) */
/* a straw that flies from the straw box into the glass */
.flyStraw {
  position: absolute;
  width: 5.5%;
  pointer-events: none;
  z-index: 25;
  transform: translate(-50%,-50%);
  transition: left 0.2s ease-in, top 0.2s ease-in, transform 0.2s ease-in;   /* fast fly to glass */
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
}
.servedSet .strawImg {
  position: absolute;
  left: 50%;         /* centered in the glass (was off to the left → poked out the side) */
  top: 2%;           /* dips into the glass; only the top pokes above the rim */
  height: 74%;       /* short enough to sit inside, not tower over the rim */
  pointer-events: none;
  transform-origin: center bottom;   /* pivots at its base, planted in the glass */
  animation: strawDrop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes strawDrop {
  0%   { transform: translateX(-50%) translateY(-30%) rotate(-10deg); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0)    rotate(-6deg);  opacity: 1; }  /* near-upright, sitting inside */
}
/* full glass composites (straw, then straw+lemon) shown on a full glass.
   Sized by HEIGHT so the glass stays the same size across both SVGs. */
.servedSet .fullStrawImg,
.servedSet .fullLemonImg,
.servedSet .halfGlassImg,
.servedSet .compositeImg {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  height: 135%;
  width: auto;
  pointer-events: none;
  transform-origin: center bottom;
  animation: fullStrawIn 0.2s cubic-bezier(0.34,1.56,0.64,1);   /* quick, snappy pop-in */
}
@keyframes fullStrawIn {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-6%) scale(0.97); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);   }
}
#lemonBox {
  position: absolute;
  left: 59.9%;
  top: 55.1%;
  width: 22.3%;
  z-index: 7;
  pointer-events: none;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
  transition: transform 0.15s;
}
/* lemon box pulses to invite a tap after the straw is added */
#lemonBox.glow {
  cursor: pointer;
  animation: boxGlow 0.9s ease-in-out infinite;
}
#lemonBox.glow:hover { transform: scale(1.06); }
/* while the glass is on the tray the boxes are tappable (pointer-events:auto) →
   hovering one makes it pulse slightly. (:not(.glow) so it doesn't clash with the tutorial glow.) */
#strawBox:not(.glow):hover, #lemonBox:not(.glow):hover {
  cursor: pointer;
  animation: boxHoverPulse 0.7s ease-in-out infinite;
}
@keyframes boxHoverPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
/* a lemon slice that drops onto the served glass rim (within the .servedSet) */
.servedSet .lemonImg {
  position: absolute;
  left: -33%;
  top: -20%;
  width: 69%;
  pointer-events: none;
  transform-origin: center;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
#tray {
  position: absolute;
  left: 43.6%;
  top: 64.4%;
  width: 37.1%;
  z-index: 8;
  pointer-events: none;
  filter: drop-shadow(0 8px 14px rgba(0,0,0,0.4));
}

/* ── coin reward (coins.svg pile placed on the counter) ── */
#coinPile {
  position: absolute;
  left: 44%; top: 48%;               /* fixed spot on the counter ledge (matches reference) */
  transform: translate(-50%, -50%);
  width: 4.5%;
  z-index: 44;
  pointer-events: none;
  display: none;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35)) drop-shadow(0 0 14px rgba(255,215,0,0.85));
}
/* magical materialise as the coins appear */
#coinPile.landIn { animation: coinLand 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes coinLand {
  0%   { transform: translate(-50%,-50%) scale(0.4);  opacity: 0; }
  55%  { transform: translate(-50%,-50%) scale(1.14); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1);    opacity: 1; }
}
/* smooth magical fade-out (float up + dissolve) */
#coinPile.fadeOut { animation: coinFade 0.7s ease forwards; }
@keyframes coinFade {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-95%) scale(1.1); opacity: 0; }
}

/* ── reward stars: a soft glowing twinkle burst over the served glass on a correct answer ── */
.star {
  position: absolute;
  z-index: 55;
  pointer-events: none;
  filter: drop-shadow(0 0 5px rgba(255,236,160,.95))
          drop-shadow(0 0 13px rgba(255,190,80,.6))
          drop-shadow(0 0 26px rgba(255,150,40,.35));   /* warm bloom, soft on the eyes */
  will-change: transform, opacity;
}

/* ── POUR button (transparent hit-area over the machine's POUR circle) ── */
#pourBtn {
  position: absolute;
  left: 20.3%;
  top: 55.7%;
  width: 6%;
  aspect-ratio: 0.5;
  background: url('new assets/main bg/pour buttone.svg') no-repeat center / contain;
  border: none;
  cursor: pointer;
  z-index: 12;
  transition: transform 0.08s ease, filter 0.08s ease;
}
/* a little glow while the button is enabled (tappable) — hugs the button shape */
#pourBtn:not(:disabled) { animation: pourReady 1.2s ease-in-out infinite; }
@keyframes pourReady {
  0%,100% { filter: drop-shadow(0 0 3px rgba(255,215,0,0.55)); }
  50%     { filter: drop-shadow(0 0 9px rgba(255,215,0,0.95)); }
}
/* press feedback — the button presses in: shrinks and darkens (image stays visible) */
#pourBtn:not(:disabled):active,
#pourBtn.pressed {
  transform: scale(0.9);
  filter: brightness(0.82) drop-shadow(0 0 6px rgba(255,215,0,0.8));
  animation: none;
}
#pourBtn:disabled { cursor: default; filter: grayscale(0.4) brightness(0.85); }

@keyframes pulseRing {
  0%   { transform: scale(0.85); opacity: 0.9; }
  100% { transform: scale(1.5);  opacity: 0;   }
}
.pulse-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 4px solid #ffd700;
  animation: pulseRing 1.1s ease-out infinite;
  pointer-events: none;
}

/* ── hand tutorial pointer ── */
#hand {
  position: absolute;
  width: 4cqw;
  height: auto;
  z-index: 30;
  pointer-events: none;
  display: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  animation: tapHand 1s ease-in-out infinite;
}
@keyframes tapHand {
  0%,100% { transform: translateY(0)   scale(1);    }
  50%     { transform: translateY(18%) scale(0.85); }
}

/* drag-gesture hint: hand sweeps up-right toward the customer */
#hand.dragHint { animation: dragHint 1.5s ease-in-out infinite; }
@keyframes dragHint {
  0%   { transform: translate(0, 0)        scale(1);    }
  15%  { transform: translate(0, 0)        scale(0.85); }
  60%  { transform: translate(180%, -150%) scale(0.85); }
  100% { transform: translate(180%, -150%) scale(1);    }
}

/* ── instruction text box (TEXT BOX.png banner) ── */
#banner {
  position: absolute;
  top: 1%;
  left: 1.25%;
  width: 97.5%;
  aspect-ratio: 1873 / 188;
  z-index: 20;
  pointer-events: none;
}
#bannerBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; }
#bannerText {
  position: absolute;
  top: 8%; bottom: 8%;
  left: 12%; right: 6%;
  display: flex;
  align-items: center;
  color: #fff;
  font-size: 2.1cqw;
  font-weight: 900;
  text-shadow: 2px 3px 6px rgba(0,0,0,0.55);
  line-height: 1.2;
}
#bannerText.typing::after {
  content: '|';
  color: #ffd700;
  animation: caretBlink 0.6s step-end infinite;
}

/* ── Check button (check button.png on the tray) ── */
#checkBtn {
  position: absolute;
  left: 57.5%;
  top: 86.5%;
  width: 9.3%;
  background: transparent;
  border: none;
  padding: 0;
  cursor: pointer;
  z-index: 13;
  display: none;
  transition: transform 0.12s, filter 0.12s, opacity 0.3s;
}
#checkBtn img { width: 100%; display: block; }
#checkBtn:not(:disabled):hover { transform: scale(1.07); filter: brightness(1.12); }
#checkBtn:not(:disabled):active { transform: scale(0.95); }
#checkBtn:disabled { opacity: 0.4; cursor: default; }

/* ── Next / Play-again button ── */
#nextBtn {
  position: absolute;
  bottom: 4%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #ffb300, #e65100);
  color: #fff;
  font-size: 2.2cqw;
  font-weight: 900;
  font-family: inherit;
  padding: 1.1% 5%;
  border-radius: 60px;
  border: 4px solid #ffd700;
  cursor: pointer;
  box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 24px rgba(255,179,0,0.6);
  letter-spacing: 1px;
  z-index: 50;
  display: none;
  animation: startPulse 1.4s ease-in-out infinite;
}
@keyframes startPulse {
  0%,100% { transform: translateX(-50%) scale(1);    }
  50%     { transform: translateX(-50%) scale(1.07); }
}

/* ── game-over screen (after the full customer cycle: 5 half + 5 full) ── */
#gameEnd {
  position: absolute; inset: 0;
  z-index: 60;
  display: none;
}
#gameEnd.show { display: block; }
/* the "Perfect Pour — complete" backdrop fills the frame (shows while the video loads) */
#endBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
/* the celebration video fills the frame and fades in over the backdrop */
#endVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#gameEnd.show #endVideo { animation: endVideoIn 0.5s ease both; }
@keyframes endVideoIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}
/* confetti layer sits above the video (pieces are created/positioned in JS) */
#confetti { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 5; }
.confettiPiece {
  position: absolute;
  top: -8%;
  width: 1.1%;
  aspect-ratio: 2 / 3;              /* little rectangular flakes */
  will-change: transform, opacity;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translate(0, 0)              rotate(0deg)   rotateX(0deg);   opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translate(var(--dx,0), 115vh) rotate(720deg) rotateX(540deg); opacity: 0.9; }
}

/* ── title screen ── */
#title {
  position: absolute;
  inset: 0;
  z-index: 70;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 16%;
  text-align: center;
}
#title.leaving { animation: introOut 0.45s ease forwards; }
#titleImg {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;
  animation: popThumb 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popThumb {
  0%   { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
.playBtn {
  position: absolute;          /* placed at the spot set in the debug overlay */
  left: 41.5%;
  top: 67.56%;
  width: 17%;
  height: auto;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  filter: drop-shadow(0 10px 22px rgba(0,0,0,0.55));
  animation: playPulse 1.2s ease-in-out infinite;
}
@keyframes playPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
.playBtn:hover { filter: drop-shadow(0 10px 26px rgba(255,215,0,0.6)); }
/* the post-game "Play Again" button sits a little lower than the initial Play button */
.playBtn.again { top: 74%; }
@keyframes introOut { 0% { opacity: 1; } 100% { opacity: 0; } }

/* ── roller shutter transition (title → game) ── */
#shutter {
  position: absolute;
  inset: 0;
  z-index: 80;                 /* above the title (z70) */
  display: none;
  transform: translateY(-100%);
  pointer-events: none;
  background: repeating-linear-gradient(to bottom,
      #6a7079 0px, #6a7079 15px,
      #474c54 15px, #474c54 19px);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.35);
}
#shutter::after {                /* leading edge bar at the bottom of the shutter */
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2.4%;
  background: linear-gradient(#262a2f, #14171a);
  box-shadow: 0 5px 14px rgba(0,0,0,0.6);
}

/* ── juice splash transition (fires when the tutorial dragon leaves) ──
   a pink juice splat bursts from the centre to swallow the scene, droplets spray
   out, then two pink waves drain off the bottom to reveal the new scene. */
#splash {
  position: absolute; inset: 0;
  z-index: 85;                 /* above gameplay (z≤44), below the dev menu (z99999) */
  display: none;
  overflow: hidden;
  pointer-events: none;
}
#splash.run { display: block; }
/* the burst blob (splash.svg) — bursts from the centre; JS scales it up to cover */
#splat {
  position: absolute;
  left: 50%; top: 50%;
  width: 46%;                  /* base size — scaled up in JS to swallow the board */
  aspect-ratio: 1035 / 1020;   /* matches splash.svg's native size */
  transform: translate(-50%,-50%) scale(0);
  opacity: 0;
  will-change: transform, opacity;
}
/* full-width pink waves — parked above the board, they drain down through it */
.wave {
  position: absolute; left: 0; top: 0;
  width: 100%; height: 132%;
  transform: translateY(-135%);   /* parked out of sight until the drain */
  will-change: transform;
}
.wave svg { width: 100%; height: 100%; display: block; }
/* droplets that spray ahead of the splat's expanding edge (positioned in JS) */
.splash-drop {
  position: absolute;
  left: 0; top: 0;
  border-radius: 50%;
  background: #F77ADE;
  pointer-events: none;
  opacity: 0;
  will-change: transform, opacity;
}

/* ════ DEV screen switcher — TEMPORARY, remove before release ════ */
#devMenu { position: fixed; top: 8px; left: 8px; z-index: 99999; font-family: system-ui, sans-serif; }
#devToggle {
  width: 40px; height: 40px; font-size: 20px; line-height: 1; cursor: pointer;
  background: rgba(0,0,0,0.72); color: #fff; border: 1px solid #999; border-radius: 8px;
}
#devToggle:hover { background: rgba(0,0,0,0.9); }
#devList {
  display: none; margin-top: 6px; background: rgba(18,8,28,0.97);
  border: 1px solid #999; border-radius: 8px; padding: 6px; min-width: 200px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}
#devList.open { display: block; }
#devList button {
  display: block; width: 100%; text-align: left; margin: 2px 0; padding: 7px 10px;
  background: #2a1838; color: #fff; border: none; border-radius: 6px; cursor: pointer;
  font: 600 13px system-ui, sans-serif;
}
#devList button:hover { background: #ffd700; color: #1a1a1a; }
/* skip-dialogue toggle (green when ON) */
#devList button.on { background: #2e7d32; color: #fff; }
#devList button.on:hover { background: #388e3c; color: #fff; }
/* per-round collapsible submenu */
#devList .devGroup { margin: 2px 0; }
#devList .devGroup .devSub {
  display: none;
  margin: 2px 0 6px 8px;
  padding-left: 8px;
  border-left: 2px solid #4a2d63;
}
#devList .devGroup.open .devSub { display: block; }
#devList .devSub button { font-size: 12px; padding: 5px 9px; background: #3a2550; }
/* ════ end DEV screen switcher ════ */

</style>

}

// ── sound (only worng.mp3 ships; pour/win use WebAudio beeps) ──

// ── dialogue voice-over ───────────────────────────────────────
// Each dialogue line maps to a recording in /audio (filename = the line text).
// Lines are queued: a line's text + narration show together, and the NEXT line
// only appears once the current line's audio has completely finished playing.
const VOICE = {
  'The customers are arriving!':            'The customers are arriving!',
  'The first customer wants a full glass.': 'The first customer wants a full glass.',
  'This customer wants a full glass.':      'The first customer wants a full glass.',  // design wording → same clip
  'This is an empty glass.':                'This is an empty glass.',
  'Tap the button to pour juice.':          'Tap the button to pour juice.',
  'Tap the button to pour the juice.':      'Tap the button to pour juice.',   // wording variant → same clip
  'Tap the Check button.':                  'Tap the Check button.',
  'Tap on the Check button.':               'Tap the Check button.',           // wording variant → same clip
  'The glass is now full.':                 'The glass is now full.',
  'Tap again!':                             'Tap again!',
  'The glass is now half full.':            'The glass is now half full.',
  'The glass is now half full. Tap on the Check button.': 'The glass is now half full.',
  'Keep pouring!':                          'Keep pouring!',
  'Tap again to pour more juice.':          'Tap again to pour more juice.',
  'Tap on the straws.':                     'Tap on the straws.',
  'Tap on the lemons.':                     'Tap on the lemons.',
  'Juice is ready!':                        'The juice is ready to be served!',   // new wording → existing clip
  'Drag the juice to the customer.':        'Drag the juice to the customer.',
  'Now, it is your turn!':                  'Now, it is your turn!',
  'Yay! You poured a full glass of juice.': 'Yay! You poured a full glass of juice.',
  'Yay! You poured a full glass. 🎉':       'Yay! You poured a full glass of juice.'  // win variant → same clip
};
// preload one Audio per unique clip
const voiceClips = {};
Object.keys(VOICE).forEach(line => {
  const file = VOICE[line];
  if (!voiceClips[file]) {
    const a = new Audio('audio/' + encodeURIComponent(file) + '.mp3');
    a.preload = 'auto';
    voiceClips[file] = a;
  }
});
// Dialogue queue: a line stays on screen with its narration until the audio has
// COMPLETELY finished. Only then does the next queued line appear and its audio
// start — so the text and the voice always advance together, never overlapping.
let voiceQueue   = [];
let voiceBusy    = false;
let currentVoice = null;
let voiceFallback = null;
// ── dragon typewriter ────────────────────────────────────────
// Reveal the line one character at a time, with a blinking caret and a soft
// click per keystroke. The not-yet-typed tail is kept in the layout (invisible)
// so the bubble reserves its final size from the first char and never resizes.
let typeTimer = null;
function stopTyping() {
  if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
}
// words/phrases to emphasise (bold) inside the dragon's bubble
const DRAGON_BOLD = ['empty glass', 'half full', 'full'];
function dragonBoldMask(chars) {
  const lower = chars.map(c => c.toLowerCase());
  const bold = new Array(chars.length).fill(false);
  DRAGON_BOLD.forEach(phrase => {
    const p = Array.from(phrase.toLowerCase());
    for (let i = 0; i + p.length <= chars.length; i++) {
      let ok = true;
      for (let j = 0; j < p.length; j++) if (lower[i + j] !== p[j]) { ok = false; break; }
      if (ok) for (let j = 0; j < p.length; j++) bold[i + j] = true;
    }
  });
  return bold;
}
// append chars[start..end) into `parent`, wrapping bold runs in <b> (so the
// invisible tail reserves the same width the bold text will take once typed)
function appendDragonRuns(parent, chars, bold, start, end) {
  let k = start;
  while (k < end) {
    const b = bold[k]; let j = k;
    while (j < end && bold[j] === b) j++;
    const txt = chars.slice(k, j).join('');
    if (b) { const el = document.createElement('b'); el.textContent = txt; parent.appendChild(el); }
    else   { parent.appendChild(document.createTextNode(txt)); }
    k = j;
  }
}
function typeDragon(text) {
  stopTyping();
  if (!bannerTxt) return;
  const chars = Array.from(text || '');     // split by code point so emoji aren't broken mid-type
  const bold  = dragonBoldMask(chars);
  bannerTxt.classList.add('typing');         // blinking caret on (see #dragonText.typing::after)
  let i = 0;
  const render = () => {
    bannerTxt.textContent = '';
    appendDragonRuns(bannerTxt, chars, bold, 0, i);          // typed (visible)
    if (i < chars.length) {
      const tail = document.createElement('span');
      tail.className = 'untyped';            // not-yet-typed (invisible, reserves space)
      appendDragonRuns(tail, chars, bold, i, chars.length);
      bannerTxt.appendChild(tail);
    }
  };
  render();
  typeTimer = setInterval(() => {
    i++;
    render();
    if (i >= chars.length) {
      stopTyping();
      bannerTxt.classList.remove('typing');         // line fully typed → caret disappears
    }
  }, 75);
}
// these "keep pouring" lines show NO dialogue box — just a hand nudge on the POUR button
const HAND_ONLY = {
  'Keep pouring!': true,
  'Tap again!': true,
  'Tap again to pour more juice.': true
};

// these lines play their narration with NO dialogue box (cues/hand still work)
const NO_BOX = {
  'Tap on the straws.': true,
  'Tap on the lemons.': true
};

// silent lines (no recording) / playback failures linger for a readable beat
function estimateDuration(text) {
  return Math.min(6500, Math.max(2200, (text ? text.length : 0) * 115));
}

function enqueueDialogue(text, onDone, onEnd) {
  voiceQueue.push({ text: text, onDone: onDone, onEnd: onEnd });
  pumpDialogue();
}

function pumpDialogue() {
  if (voiceBusy) return;                    // a line is still narrating — wait for it
  const item = voiceQueue.shift();
  if (!item) return;
  voiceBusy = true;

  // show this line now (once the dragon host has left, no bubble/voice appears)
  if (!dragonGone) {
    if (HAND_ONLY[item.text]) {
      // "keep pouring" prompts: no box — just nudge the POUR button while the dragon speaks
      stopTyping();
      if (bannerEl) bannerEl.classList.remove('show');
      showPourHand();
    } else if (NO_BOX[item.text]) {
      // box-less narration: the dragon speaks with no dialogue box; cues (glow/hand)
      // attached to the line still work via the boxlessLine flag in cueVisible()
      stopTyping();
      if (bannerEl) bannerEl.classList.remove('show');
      hideHand();
      boxlessLine = true;
    } else {
      if (bannerEl)  bannerEl.classList.add('show');
      if (bannerTxt) {
        if (skipDialogue) { stopTyping(); bannerTxt.classList.remove('typing'); bannerTxt.textContent = item.text; }
        else              typeDragon(item.text);   // typewriter reveal + blinking caret + click SFX
      }
      hideHand();                            // a normal box line — clear any leftover pour hand
    }
    dragonTalk(true);                        // dragon animates while it's saying the line
  }
  if (item.onDone) item.onDone();           // keep gameplay chains/setup running

  // advance to the next line — fired once, when this line's audio truly ends
  let advanced = false;
  const advance = () => {
    if (advanced) return;
    advanced = true;
    if (voiceFallback) { clearTimeout(voiceFallback); voiceFallback = null; }
    if (currentVoice) { try { currentVoice.onended = null; } catch (e) {} currentVoice = null; }
    dragonTalk(false);                      // stopped talking — freeze the dragon
    boxlessLine = false;                    // box-less line over — cues need a visible box again
    if (item.onEnd) item.onEnd();           // this line's audio has fully finished
    voiceBusy = false;
    pumpDialogue();
  };

  const file = (dragonGone || skipDialogue) ? null : VOICE[item.text];
  const clip = file ? voiceClips[file] : null;
  if (clip) {
    currentVoice = clip;
    clip.onended = advance;                 // ← the next line waits for THIS to fire
    // safety net so a missing 'ended' event can never freeze the dialogue forever
    const safety = (isFinite(clip.duration) && clip.duration > 0) ? clip.duration * 1000 + 800 : 12000;
    voiceFallback = setTimeout(advance, safety);
    try {
      clip.currentTime = 0;
      const p = clip.play();
      if (p) p.catch(() => {                 // autoplay blocked / error — fall back to a timer
        if (!advanced) { clearTimeout(voiceFallback); voiceFallback = setTimeout(advance, estimateDuration(item.text)); }
      });
    } catch (e) {
      clearTimeout(voiceFallback); voiceFallback = setTimeout(advance, estimateDuration(item.text));
    }
  } else {
    voiceFallback = setTimeout(advance, skipDialogue ? 50 : estimateDuration(item.text));  // silent line — timed (dev skip → near-instant)
  }
}

// drop any pending/playing narration (used on round reset)
function clearVoiceQueue() {
  voiceQueue = [];
  voiceBusy  = false;
  boxlessLine = false;
  stopTyping();                      // abort any in-progress typewriter reveal
  if (voiceFallback) { clearTimeout(voiceFallback); voiceFallback = null; }
  if (currentVoice) {
    try { currentVoice.onended = null; currentVoice.pause(); currentVoice.currentTime = 0; } catch (e) {}
    currentVoice = null;
  }
  dragonTalk(false);                 // stopped talking — freeze the dragon
}

// ── dragon animation: the GIF only plays while the dragon is speaking ──
// An animated webp can't be paused, so when idle we draw the CURRENT frame onto
// a canvas placed over the dragon and hide the live image. We only DRAW to the
// canvas (never read it), so this also works when the page runs from file://.
let dragonTalking = true, dragonFreezeCv = null;
function freezeDragon() {
  if (!dragonEl || dragonGone || !dragonEl.naturalWidth) return;
  const r = dragonEl.getBoundingClientRect(), fr = gcEl.getBoundingClientRect();
  if (r.width < 2 || r.height < 2) return;
  if (!dragonFreezeCv) {
    dragonFreezeCv = document.createElement('canvas');
    dragonFreezeCv.style.position = 'absolute';
    dragonFreezeCv.style.pointerEvents = 'none';
    gcEl.appendChild(dragonFreezeCv);
  }
  const cv = dragonFreezeCv;
  cv.width = Math.round(r.width); cv.height = Math.round(r.height);
  const iw = dragonEl.naturalWidth, ih = dragonEl.naturalHeight;
  const s = Math.min(r.width / iw, r.height / ih);     // replicate object-fit: contain
  const dw = iw * s, dh = ih * s;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  try { ctx.drawImage(dragonEl, (r.width - dw) / 2, (r.height - dh) / 2, dw, dh); } catch (e) { return; }
  cv.style.left = (r.left - fr.left) + 'px'; cv.style.top = (r.top - fr.top) + 'px';
  cv.style.width = r.width + 'px'; cv.style.height = r.height + 'px';
  cv.style.zIndex = 9; cv.style.display = 'block';
  dragonEl.style.visibility = 'hidden';                // hide the live (still-animating) image
}
function unfreezeDragon() {
  if (dragonFreezeCv) dragonFreezeCv.style.display = 'none';
  if (dragonEl) dragonEl.style.visibility = '';
}
function dragonTalk(on) {
  if (!dragonEl || dragonGone) return;
  on = !!on;
  if (on === dragonTalking) return;
  dragonTalking = on;
  if (on) unfreezeDragon();          // audio playing → show the live animated image
  else    freezeDragon();            // audio stopped → freeze on the current frame
}
if (dragonEl) {
  const startIdle = () => { dragonTalking = true; dragonTalk(false); };  // freeze until it speaks
  if (dragonEl.complete && dragonEl.naturalWidth) startIdle();
  else dragonEl.addEventListener('load', startIdle, { once: true });
}

// end of tutorial: the host dragon slides off to the right and is removed,
// together with its dialogue box. No more narration bubble after this.
function dragonExit() {
  if (dragonGone) return;
  unfreezeDragon();                                    // show the live image so the slide-off is visible
  dragonGone = true;
  if (bannerEl) bannerEl.classList.remove('show');     // remove the dialogue box
  if (dragonEl) {
    dragonEl.classList.add('exitRight');               // slide off to the right
    setTimeout(() => { if (dragonEl) dragonEl.style.display = 'none'; }, 1000);  // then remove
  }
  playSplashTransition();                              // pink juice-splash wipe into customer mode
}

// ── 2+ wrong-Check hint: customer bubble glows → the dragon pops back in with a
// pour-count tip → the dragon leaves again → a hand nudge guides the next pour.
// Works in both solo rounds and customer/pair mode (the dragon may already be
// "gone" for good in pair mode — this brings it back just for the one line).
let wrongCheckCount = 0;
let hintActive = false;   // true while the wrong-hint sequence runs → suppresses every other hand cue
function triggerWrongHint(target, bubbleEl) {
  if (!bubbleEl || !dragonEl || hintActive) return;   // don't stack if one is already running
  hintActive = true;
  hideHand();             // no hand anywhere while the dragon does its thing

  // 1) glow the customer's order bubble to draw attention
  bubbleEl.classList.remove('glow'); void bubbleEl.offsetWidth; bubbleEl.classList.add('glow');
  setTimeout(() => bubbleEl.classList.remove('glow'), 2000);

  // 2) shortly after, the dragon slides fully into view first —
  // (phase is still 'done' here — tryAgain() only flips it back to 'play' a bit
  // later — so only bail if the round itself has actually moved on/ended)
  setTimeout(() => {
    if (phase === 'gameover' || phase === 'intro') { hintActive = false; return; }   // round ended/reset
    const wasGone = dragonGone;
    unfreezeDragon();
    dragonEl.classList.remove('exitRight');
    dragonEl.style.display = '';
    void dragonEl.offsetWidth;
    dragonEl.classList.add('hintIn');

    // 3) only once the dragon has FULLY arrived does its dialogue box appear
    setTimeout(() => {
      if (phase === 'gameover' || phase === 'intro') {          // round ended mid-slide — bail cleanly
        dragonEl.classList.remove('hintIn'); dragonEl.style.display = 'none'; dragonGone = wasGone; hintActive = false; return;
      }
      dragonGone = false;                               // now let the line show its bubble + voice
      hideHand();                                       // belt-and-braces: no stray hand during the line
      pourBtn.disabled = true;                          // keep POUR locked so the line can't be cut short
      const line = target === 'full' ? 'Tap the Pour button 4 times.' : 'Tap the Pour button 2 times.';
      // typeBanner's 3rd arg fires only AFTER the whole line has been delivered (typed + read)
      typeBanner(line, null, () => {
        // 4) dialogue fully delivered → brief beat, THEN the dragon leaves the screen
        setTimeout(() => {
          if (bannerEl) bannerEl.classList.remove('show');   // dismiss the bubble as the dragon departs
          unfreezeDragon();                                  // hide the freeze-canvas so the LIVE dragon slides out (not a frozen copy)
          dragonEl.classList.remove('hintIn');
          dragonEl.classList.add('exitRight');
          setTimeout(() => {
            if (dragonEl) { dragonEl.classList.remove('exitRight'); dragonEl.style.display = 'none'; }
            unfreezeDragon();                                // belt-and-braces: ensure no frozen dragon lingers
            dragonGone = wasGone;
            hintActive = false;
            // 5) only after the dragon has fully exited does the hand hint appear
            if (phase === 'play') { pourBtn.disabled = false; showPourHand(); if (pairMode) armPourNudge(); }
          }, 1000);
        }, 500);   // reading beat after the line is complete
      });
    }, 800);   // matches the #dragon.hintIn slide-in duration (0.8s)
  }, 900);
}

let actx = null;
function beep(freq, dur, type) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, actx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) {}
}
// a short, soft mechanical "click" for the dragon's typewriter text
function typeClick() {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    const t = actx.currentTime;
    o.type = 'square';
    o.frequency.setValueAtTime(1500, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.045, t + 0.004);   // soft typewriter tick (quieter)
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.028);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.035);
  } catch (e) {}
}
function playPourSound() { beep(520, 0.18, 'triangle'); }
function playWinSound()  { beep(660, 0.12); setTimeout(() => beep(880, 0.16), 130); }
function playWrongSound(){ try { wrongSound.currentTime = 0; wrongSound.play().catch(() => {}); } catch (e) {} }

// a bright "pop" for elements popping in
function popSound() {

// ── juice splash transition (plays when the tutorial dragon leaves) ──
// (bubblePop / whooshSound are legacy helpers, kept for reference)
function bubblePop() {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    const base = 420 + Math.random() * 300;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(base, t);
    o.frequency.exponentialRampToValueAtTime(base * 2.3, t + 0.05);   // quick "bloop" upward
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);

// an airy "whoosh" for the pastel wipe sweep
function whooshSound() {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime, dur = 0.55;
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = actx.createBufferSource(); src.buffer = buf;
    const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.7;
    bp.frequency.setValueAtTime(380, t);
    bp.frequency.exponentialRampToValueAtTime(2600, t + dur);
    const g = actx.createGain();
    g.gain.setValueAtTime(0.10, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp); bp.connect(g); g.connect(actx.destination);
    src.start(t); src.stop(t + dur);
  } catch (e) {}
}
// droplets that spray ahead of the splat's expanding edge
function spawnSplashDrops(fx) {
  const rect = fx.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'splash-drop';
    const size = 10 + Math.random() * 30;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    fx.appendChild(d);
    const ang  = Math.random() * Math.PI * 2;
    const dist = rect.width * (0.28 + Math.random() * 0.34);
    const x0 = cx + Math.cos(ang) * rect.width * 0.12 - size / 2;
    const y0 = cy + Math.sin(ang) * rect.height * 0.14 - size / 2;
    const x1 = cx + Math.cos(ang) * dist - size / 2;
    const y1 = cy + Math.sin(ang) * dist * 0.75 - size / 2;
    d.animate([
      { transform: 'translate(' + x0.toFixed(0) + 'px,' + y0.toFixed(0) + 'px) scale(0.6)', opacity: 1 },
      { transform: 'translate(' + x1.toFixed(0) + 'px,' + y1.toFixed(0) + 'px) scale(' + (0.5 + Math.random() * 0.7).toFixed(2) + ')', opacity: 0 }
    ], { duration: 400 + Math.random() * 260, delay: 120 + Math.random() * 240, easing: 'cubic-bezier(0.2,0.6,0.4,1)', fill: 'forwards' });
    setTimeout(() => d.remove(), 950);
  }
}

// the pink juice-splash wipe: splat bursts to cover, then the waves drain off the bottom
function playSplashTransition() {
  const fx    = document.getElementById('splash');
  if (!fx) return;
  const splat = document.getElementById('splat');
  const back  = fx.querySelector('.wave-back');
  const front = fx.querySelector('.wave-front');

  // clean restart if a previous run is mid-flight
  [splat, back, front].forEach(el => el && el.getAnimations().forEach(a => a.cancel()));
  fx.querySelectorAll('.splash-drop').forEach(d => d.remove());
  back.style.transform  = 'translateY(-135%)';     // waves parked above the board
  front.style.transform = 'translateY(-135%)';
  splat.style.opacity   = '1';
  splat.style.transform = 'translate(-50%,-50%) scale(0)';
  fx.classList.add('run');
  splashSound();

  // the juice splat bursts from the centre and swallows the screen
  splat.animate([
    { transform: 'translate(-50%,-50%) scale(0) rotate(-15deg)', opacity: 1 },
    { transform: 'translate(-50%,-50%) scale(4.8) rotate(9deg)', opacity: 1 }
  ], { duration: 700, easing: 'cubic-bezier(0.55,0,1,0.45)', fill: 'forwards' });
  spawnSplashDrops(fx);

  // once covered → the waves take over (same pink, seamless) and the splat fades
  setTimeout(() => {
    back.style.transform  = 'translateY(-16%)';    // solid pink cover
    front.style.transform = 'translateY(-16%)';
    splat.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 200, fill: 'forwards' });
  }, 740);

  // ...then the waves drain off the bottom, revealing the new scene
  setTimeout(() => {
    back.animate([{ transform: 'translateY(-16%)' }, { transform: 'translateY(116%)' }],
      { duration: 1050, easing: 'cubic-bezier(0.55,0,1,0.45)', fill: 'forwards' });
    setTimeout(() => {
      front.animate([{ transform: 'translateY(-16%)' }, { transform: 'translateY(116%)' }],
        { duration: 1050, easing: 'cubic-bezier(0.55,0,1,0.45)', fill: 'forwards' });
    }, 120);
  }, 980);

  // tidy up after the drain finishes
  setTimeout(() => {
    [splat, back, front].forEach(el => el && el.getAnimations().forEach(a => a.cancel()));
    fx.classList.remove('run');
    back.style.transform  = 'translateY(-135%)';
    front.style.transform = 'translateY(-135%)';
    splat.style.opacity   = '0';
    splat.style.transform = 'translate(-50%,-50%) scale(0)';
    fx.querySelectorAll('.splash-drop').forEach(d => d.remove());
  }, 2250);
}

// a wet juice-splash sound: liquid rush → SPLAT at full cover → droplets → drain
function splashSound() {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    // filtered-noise helper (rise/fall a bandpass over a short burst)
    const noise = (start, dur, f0, f1, peak, type) => {
      const buf = actx.createBuffer(1, Math.max(1, Math.floor(actx.sampleRate * dur)), actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = actx.createBufferSource(); src.buffer = buf;
      const bp = actx.createBiquadFilter(); bp.type = type || 'bandpass'; bp.Q.value = 0.8;
      bp.frequency.setValueAtTime(f0, start);
      bp.frequency.exponentialRampToValueAtTime(f1, start + dur);
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(peak, start + Math.min(0.05, dur * 0.25));
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      src.connect(bp); bp.connect(g); g.connect(actx.destination);
      src.start(start); src.stop(start + dur);
    };
    noise(t,        0.55, 500, 1900, 0.12, 'bandpass');   // liquid rushing outward
    noise(t + 0.68, 0.30, 1400, 300, 0.24, 'lowpass');    // big wet SPLAT at full cover
    // low thud under the splat (scheduled to land with the cover)
    const o = actx.createOscillator(), tg = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, t + 0.68);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.86);
    tg.gain.setValueAtTime(0.0001, t + 0.68);
    tg.gain.exponentialRampToValueAtTime(0.2, t + 0.71);
    tg.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    o.connect(tg); tg.connect(actx.destination);
    o.start(t + 0.68); o.stop(t + 0.92);
    for (let i = 0; i < 6; i++) {                          // droplets pattering down
      const dt = 0.78 + Math.random() * 0.5;
      noise(t + dt, 0.06, 400 + Math.random() * 700, 260, 0.05, 'bandpass');
    }
    noise(t + 1.4,  0.55, 900, 180, 0.10, 'lowpass');     // draining away
  } catch (e) {}
}

// ── round init ────────────────────────────────────────────────
function initRound() {
  const r = ROUNDS[level];
  fillPct = 0; hasPoured = false; phase = 'intro';
  wrongCheckCount = 0; hintActive = false;   // fresh round → reset the wrong-attempt streak + hint
  tutorial = (r.skin === 'ghost');   // full hand-guided walkthrough for the ghost
  if (bannerEl) bannerEl.classList.remove('show');   // dragon's bubble appears when it speaks
  // a fresh tutorial run (rounds loop back to the ghost) brings the host dragon back
  if (tutorial && dragonEl) {
    dragonGone = false;
    dragonEl.classList.remove('exitRight', 'intro');
    dragonEl.style.display = '';
  }
  if (bannerEl) bannerEl.classList.remove('introPos');

  setJuice(0);
  glassEl.classList.remove('glow');   // clear any leftover tutorial highlight
  clearServed();
  pourBtn.disabled = true;            // every interaction starts locked, unlocked by its instruction
  checkBtn.style.display = 'none';
  checkBtn.disabled = true;
  removePulse();
  handEl.style.display = 'none';
  clearInterval(bannerTimer);
  if (bannerTxt) bannerTxt.textContent = '';
  clearVoiceQueue();                 // drop any narration left over from the previous round

  // load this round's client (hidden until it walks in)
  clientEl.className = '';
  clientEl.style.zIndex = '';        // back behind the counter
  clientEl.style.height = '';
  clientEl.src = r.client;
  if (r.skin) clientEl.classList.add(r.skin);
  // half-glass customers get their own order bubble art
  const thoughtBg = document.getElementById('thoughtBg');
  if (thoughtBg) thoughtBg.src = (r.target === 'half')
    ? 'new assets/dailoge box for half glass.svg'
    : 'new assets/dailoge box.svg';
  // the order is shown by the bubble art itself — no text overlay
  const thoughtInner = document.getElementById('thoughtInner');
  if (thoughtInner) { thoughtInner.textContent = ''; thoughtInner.style.fontSize = ''; }
  hideThought();

  if (titleDone) setTimeout(walkInClient, 400);
}

// ── title ─────────────────────────────────────────────────────
function leaveTitle() {
  if (titleDone) return;
  titleDone = true;
  popSound();                      // pop on the start button
  stopTitleMusic();                // Play tapped → title music off…
  playGameMusic();                 // …and the gameplay music starts

// ── tutorial: dragon's welcome intro, then the first customer arrives ──
function startTutorialIntro() {

// ── client walks in (right → left), then its order pops, then the guide ──
