function hideThought() { thoughtEl.classList.remove('show', 'glow'); }

// ── dialogue line ─────────────────────────────────────────────
// Queue the line: it appears (and its narration plays) only once the previous
// line's audio has fully finished. See pumpDialogue() for the actual display.
let bannerTimer = null;
function typeBanner(text, onDone, onEnd) {
  if (!bannerTxt) { if (onDone) onDone(); if (onEnd) onEnd(); return; }   // keep callback chain alive
  enqueueDialogue(text, onDone, onEnd);
}

// ── start play ────────────────────────────────────────────────
function startGame() {
  if (phase !== 'intro') return;
  phase = 'play';
  checkBtn.style.display = 'none';   // hidden until the first pour
  checkBtn.disabled = true;
  pourBtn.disabled = true;           // POUR stays locked until its instruction appears

  setTimeout(() => {
    if (tutorial) {
      // ("This is an empty glass." line removed — the glass glows during the pour instruction instead)
      glassEl.classList.add('glow');
      typeBanner('Tap the button to pour juice.', () => {
        glassEl.classList.remove('glow');
      }, () => {
        pourBtn.disabled = false;     // unlock pouring AFTER the dragon finishes explaining
        showPourHand();               // …and nudge the POUR button now that it's tappable
      });
    } else {
      // solo rounds: the dragon host has left — there's no narration to wait for,
      // so enable pouring right away. Nothing should sit disabled.
      pourBtn.disabled = false;
      showPourHand();
    }
  }, 700);
}

// hand positions for each guided step
function placeHand()       { moveHand('22%', '69%'); }     // POUR button
function handToCheck()     { if (phase !== 'play') return; moveHand('61%', '90%'); }   // Check button (never after Check was pressed)
// centre the hand nudge exactly on a target element (measured live → exact at any size)
// `force` shows the hand without a dialogue line (used by the idle nudges)
function handToCenterOf(el, force) {
  if (!force && !cueVisible()) { hideHand(); return; }
  const gr = gcEl.getBoundingClientRect();
  const b  = el.getBoundingClientRect();
  handEl.classList.remove('dragHint');
  handEl.style.display = 'block';                    // show first so the hand's size is measurable
  const hw = handEl.offsetWidth, hh = handEl.offsetHeight;
  handEl.style.left = ((b.left + b.width  / 2 - gr.left - hw / 2) / gr.width  * 100) + '%';
  handEl.style.top  = ((b.top  + b.height / 2 - gr.top  - hh / 2) / gr.height * 100) + '%';
}
function handToStrawBox()  { handToCenterOf(strawBox); }   // straw box — hand dead-centre
function handToLemonBox()  { handToCenterOf(lemonBox); }   // lemon box — hand dead-centre
function handToDrag()      { moveHand('60%', '74%', true); } // drag the glass → customer

// ── straw/lemon idle nudge (solo + customer modes) ──────────────
// If the player hasn't tapped a box ~8–10s after the glass lands on the tray,
// glow+pulse the straw box first (with the hand centred on it); once the straw
// is added, the same idle window re-arms to guide them to the lemon box next.
// The tutorial is excluded — it already guides each step immediately.
const BOX_IDLE_MS = 9000;
let boxIdleTimer = null;
function armBoxIdleNudge() {
  cancelBoxIdleNudge();
  if (tutorial || !servedSet || (strawAdded && lemonAdded)) return;
  boxIdleTimer = setTimeout(() => {
    if (!servedSet || tutorial) return;
    if (!strawAdded)      { strawBox.classList.add('glow'); handToCenterOf(strawBox, true); }
    else if (!lemonAdded) { lemonBox.classList.add('glow'); handToCenterOf(lemonBox, true); }
  }, BOX_IDLE_MS);
}
function cancelBoxIdleNudge() {
  if (boxIdleTimer) { clearTimeout(boxIdleTimer); boxIdleTimer = null; }
}

// ── pour ──────────────────────────────────────────────────────
function pour() {
  if (phase !== 'play') return;
  if (pourBtn.disabled) return;     // locked (e.g. dragon is explaining) — ignore taps
  const r = ROUNDS[level];
  // free pouring normally; during the ghost tutorial, stop exactly at the target
  const cap = tutorial ? (r.target === 'half' ? 50 : 100) : 100;
  if (fillPct >= cap) return;

  hasPoured = true;
  removePulse();
  // solo rounds: the Check button appears (usable) as soon as they pour.
  // tutorial: it stays HIDDEN until the glass is full — the cap block below shows it
  // together with the "Tap the Check button." line, so it never appears while pouring.
  if (!tutorial) { checkBtn.style.display = 'block'; checkBtn.disabled = false; }
  hideHand();                           // pour clicked — remove the hand nudge
  if (pairMode) armPourNudge();         // reset the idle-nudge timer on each pour

  pourBtn.classList.add('pressed');
  setTimeout(() => pourBtn.classList.remove('pressed'), 140);

  // play the pour sound from the start
  try { pourSound.currentTime = 0; pourSound.play().catch(() => {}); } catch (e) {}

  // flowing pour stream + splash
  stream.classList.remove('pouring');
  void stream.offsetWidth;
  stream.classList.add('pouring');
  setTimeout(() => {
    stream.classList.remove('pouring');
    try { pourSound.pause(); pourSound.currentTime = 0; } catch (e) {}   // animation done — stop the sound
  }, 920);
  spawnSplash();

  fillPct = Math.min(fillPct + STEP, cap);
  setJuice(fillPct);
  if (fillPct >= 100) pourBtn.disabled = true;   // glass is full — disable pouring

  // tutorial half-way beat: on the 2nd tap (50%) pause to teach "half full"
  if (tutorial && fillPct === 50) {
    pourBtn.disabled = true;             // lock the POUR button immediately (no over-pouring)
    glassEl.classList.add('glow');       // glow the glass to draw attention
    clearVoiceQueue();                   // drop any pending line so the beat shows right now
    hideHand();
    typeBanner('The glass is now half full.', null, () => {
      glassEl.classList.remove('glow');  // dialogue finished →
      pourBtn.disabled = false;          //   re-enable the POUR button…
      showPourHand();                    //   …and show the hand nudge on it
    });
    return;                              // skip the generic narration for this tap
  }

  afterPour(r);

  // tutorial: pour freely; once the glass is COMPLETELY FULL, lock POUR.
  // the Check button is revealed by the "The glass is now full." line (see afterPour).
  if (tutorial && fillPct >= 100) {
    pourBtn.disabled = true;             // glass full — no more pouring
    setTimeout(() => { if (phase === 'play') typeBanner('Tap the Check button.',
      () => { glassEl.classList.remove('glow'); handToCheck(); }); }, 1100);   // cue: glow off + hand on Check
  }
}

function afterPour(r) {
  glassEl.classList.remove('glow');   // clear any previous highlight on each new pour
  // re-enable POUR only AFTER the dragon finishes the next instruction (one tap per line)
  const enablePour = () => { pourBtn.disabled = false; };
  // ── tutorial (first customer, full glass): step-by-step narration ──
  if (tutorial) {
    // the 50% (half-full) beat is handled in pour() before afterPour runs
    if (fillPct >= 100)      typeBanner('The glass is now full.', () => {
      if (cueVisible()) glassEl.classList.add('glow');
      checkBtn.style.display = 'block';   // reveal Check exactly as the dragon says the glass is full
      checkBtn.disabled = false;
    });  // full → no re-enable
    else if (fillPct >= 75)  typeBanner('Tap again!', null, enablePour);
    else                     typeBanner('Keep pouring!', null, enablePour);
    return;
  }
  if (pairMode) return;   // two-client mode: no narration (dragon is gone); just pour freely
  // ── normal single-client rounds ──
  if (r.target === 'full') {
    if (fillPct >= FULL_MIN)            typeBanner('Tap on the Check button.');
    else if (fillPct >= 48 && fillPct <= 52) typeBanner('The glass is now half full.');
    else                                typeBanner('Tap again to pour more juice.');
  } else {
    if (fillPct >= 50) typeBanner('The glass is now half full. Tap on the Check button.');
    else               typeBanner('Tap again to pour more juice.');
  }
}

// splash droplets where the stream hits the juice surface
function spawnSplash() {
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'splash';
    const sz = 0.5 + Math.random() * 0.7;
    d.style.width = sz + '%';
    d.style.aspectRatio = '1';
    d.style.left = (23.0 + Math.random() * 1.4) + '%';
    d.style.top  = (83 + Math.random() * 2) + '%';
    d.style.setProperty('--dx', ((Math.random() * 2 - 1) * 40).toFixed(0) + 'px');
    d.style.setProperty('--dy', (-(18 + Math.random() * 28)).toFixed(0) + 'px');
    gcEl.appendChild(d);
    setTimeout(() => d.remove(), 560);
  }
}

// ── reward stars: soft glowing SVG stars that twinkle-burst on a correct answer ──
let starSeq = 0;   // unique gradient id per star (so glows never clash)

// build one soft radial-gradient star of the given pixel size
function starEl(size) {
  const gid = 'sg' + (starSeq++);
  const d = document.createElement('div');
  d.className = 'star';
  d.style.width  = size + 'px';
  d.style.height = size + 'px';
  d.innerHTML =
    '<svg viewBox="0 0 100 100" width="100%" height="100%">' +
      '<defs><radialGradient id="' + gid + '" cx="50%" cy="50%" r="55%">' +
        '<stop offset="0%"   stop-color="#FFFFF6" stop-opacity="1"/>' +
        '<stop offset="30%"  stop-color="#FFE68F" stop-opacity=".98"/>' +
        '<stop offset="62%"  stop-color="#FFBA4D" stop-opacity=".6"/>' +
        '<stop offset="100%" stop-color="#FF9E2C" stop-opacity="0"/>' +
      '</radialGradient></defs>' +
      // soft 4-point sparkle — concave curved edges, tips fade out for an eye-friendly glow
      '<path d="M50 2 C53 41 59 47 98 50 C59 53 53 59 50 98 C47 59 41 53 2 50 C41 47 47 41 50 2 Z" ' +
        'fill="url(#' + gid + ')"/>' +
    '</svg>';
  return d;
}

// twinkle burst of N soft stars around (x, y) px inside `container`
function popStar(x, y, container, k) {
  k = k || 1;                          // stage scale so the burst tracks the responsive board
  const N = 10;
  for (let i = 0; i < N; i++) {
    const size = (16 + Math.random() * 30) * k;      // small, delicate
    const s = starEl(size);
    const ang  = Math.random() * Math.PI * 2;
    const dist = Math.random() * 64 * k;             // scattered softly around the point
    const px = x + Math.cos(ang) * dist, py = y + Math.sin(ang) * dist;
    s.style.left = (px - size / 2) + 'px';
    s.style.top  = (py - size / 2) + 'px';
    container.appendChild(s);

    const driftY = -(14 + Math.random() * 44) * k;   // floats upward
    const rot    = Math.random() * 50 - 25;
    const dur    = 820 + Math.random() * 620;
    const delay  = Math.random() * 300;

    s.animate([
      { transform: 'scale(0) rotate(0deg)',           opacity: 0,   offset: 0 },
      { transform: 'scale(1) rotate(' + rot + 'deg)', opacity: .95, offset: .4 },
      { transform: 'translateY(' + driftY + 'px) scale(.55) rotate(' + (rot * 1.6) + 'deg)', opacity: 0, offset: 1 }
    ], { duration: dur, delay: delay, easing: 'cubic-bezier(.25,.7,.4,1)', fill: 'forwards' });

    setTimeout(() => s.remove(), dur + delay + 60);
  }
}

// fire the reward burst over a glass element (defaults to the machine glass)
function spawnRewardStars(targetEl) {
  const el = targetEl || glassEl;
  const cr = el.getBoundingClientRect();
  const gr = gcEl.getBoundingClientRect();
  if (!cr.width || !gr.width) return;
  const cx = cr.left - gr.left + cr.width / 2;
  const cy = cr.top  - gr.top  + cr.height * 0.42;   // over the upper (liquid) part of the glass
  popStar(cx, cy, gcEl, gr.width / 1280);            // center over the glass; scale to the board
}

// ── set juice level ───────────────────────────────────────────
// move the liquid clip: y = bottom (empty) … top (full)
function setJuice(pct) {
  const frac = Math.max(0, Math.min(1, pct / 100));
  const top = 340, bot = 1735;         // liquid surface range inside the glass SVG
  if (fillRect) fillRect.setAttribute('y', (bot - frac * (bot - top)).toFixed(1));
}

// ── on a correct answer: clone the filled glass into a draggable set on the tray ──
let servedSet = null;

function serveToTray() {
  glassEl.classList.remove('glow');   // glass is leaving for the tray — stop the highlight (and don't clone it)
  const set = document.createElement('div');
  set.className = 'servedSet';

  const clone = glassEl.cloneNode(true);
  clone.removeAttribute('id');
  clone.classList.add('glassImg');
  const guide = clone.querySelector('line'); if (guide) guide.remove();   // no half-line on the served glass
  servedN++;
  // give the clone's clip a unique id so it freezes at the current fill level
  const cp = clone.querySelector('clipPath');
  if (cp) {
    const nid = 'fillClipServed' + servedN;
    cp.id = nid;
    clone.querySelectorAll('[clip-path]').forEach(g => g.setAttribute('clip-path', 'url(#' + nid + ')'));
    const r = clone.querySelector('rect'); if (r) r.removeAttribute('id');
  }
  set.appendChild(clone);
  set.style.left = '20.24%';   // start over the machine glass
  set.style.top  = '79.4%';
  gcEl.appendChild(set);
  servedSet = set;
  popSound();                  // glass pops onto the tray

  checkBtn.style.display = 'none';   // glass is on the tray — hide the Check button
  setJuice(0);                 // the filled glass "left", machine now shows an empty one

  // fly it onto the tray on the next frame so the transition runs
  requestAnimationFrame(() => requestAnimationFrame(() => {
    set.style.left = '58.5%';
    set.style.top  = '73%';
  }));

  // (the reward star burst now fires on the machine glass at Check time — see onSuccess/checkPair)

  // once it has landed, invite the player to add a straw
  strawAdded = false; lemonAdded = false;
  setTimeout(() => {
    if (tutorial) {
      // tutorial: guided — straw first
      typeBanner('Tap on the straws.', () => {
        strawBox.style.pointerEvents = 'auto';
        if (cueVisible()) strawBox.classList.add('glow');
        handToStrawBox();
      });
    } else {
      // solo rounds (full or half): either box may be tapped first — enable BOTH
      strawBox.style.pointerEvents = 'auto';
      lemonBox.style.pointerEvents = 'auto';
      armBoxIdleNudge();   // idle ~9s with no tap → glow + hand nudge on the straw box first
    }
  }, 950);
}

// player clicked the glowing straw box → drop a straw into the served glass,
// then the lemon box starts glowing
// an ingredient flies from its box into the served glass, then `done()` runs
function flyToGlass(imgSrc, fromEl, done) {
  if (!servedSet || !fromEl) { if (done) done(); return; }
  const fr = gcEl.getBoundingClientRect();
  const a = fromEl.getBoundingClientRect();
  const L = px => ((px - fr.left) / fr.width * 100) + '%';
  const T = px => ((px - fr.top) / fr.height * 100) + '%';
  const fly = document.createElement('img');
  fly.src = imgSrc;
  fly.className = 'flyStraw';
  fly.style.left = L(a.left + a.width / 2);
  fly.style.top  = T(a.top + a.height / 2);
  gcEl.appendChild(fly);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (!servedSet) { fly.remove(); if (done) done(); return; }
    const b = servedSet.getBoundingClientRect();
    fly.style.left = L(b.left + b.width / 2);
    fly.style.top  = T(b.top + b.height * 0.25);
    fly.style.transform = 'translate(-50%,-50%) scale(0.55) rotate(-12deg)';
  }));
  setTimeout(() => { fly.remove(); if (done) done(); }, 220);   // fast: composite lands quickly
}

// finished-drink composite art per order. Either box may be tapped first:
//   1st ingredient (straw OR lemon) → "<glass> with <that ingredient>"
//   2nd ingredient (the other box)  → "complete <glass>" → ready to serve
const COMPOSITES = {
  full: {
    straw:    'new assets/full glass with  strow.svg',
    lemon:    'new assets/full glass with lemon.svg',
    complete: 'new assets/complete full glass.svg'
  },
  half: {
    straw:    'new assets/main bg/half glass with strow ..svg',
    lemon:    'new assets/main bg/half glass with lemon.svg',
    complete: 'new assets/main bg/complete the half glass.svg'
  }
};
function compositeAdd(which) {            // which = 'straw' | 'lemon'
  if (!servedSet) return;
  const g = servedSet.querySelector('.glassImg');
  if (g) g.style.visibility = 'hidden';   // composite depicts the whole glass — hide the plain one
  const both = strawAdded && lemonAdded;  // both boxes now tapped → completed drink
  const target = pairMode ? servedLevel : ROUNDS[level].target;   // pair mode: the drink's own level
  const set = COMPOSITES[target] || COMPOSITES.full;
  const prev = servedSet.querySelector('.compositeImg');
  if (prev) prev.remove();                // swap out the single-ingredient art
  const img = document.createElement('img');
  img.className = 'compositeImg';
  img.src = both ? set.complete : set[which];
  servedSet.appendChild(img);
  popSound();
  if (both) {
    // second ingredient in → ready to drag to the customer ("Juice is ready!" line removed)
    if (tutorial) {
      setTimeout(enableServeDrag, 600);   // brief beat after the lemon lands, then the drag guide
    } else {
      enableServeDrag();
    }
  }
}

function addStrawToServed() {
  if (strawAdded || !servedSet) return;
  strawAdded = true;
  cancelBoxIdleNudge();             // player acted — drop any pending idle nudge
  hideHand();                       // straw tapped — clear the straw-box hand cue
  strawBox.classList.remove('glow');
  strawBox.style.pointerEvents = 'none';
  popSound();                       // a straw lifts out of the box

  // straw flies from the box into the glass, then the composite lands
  flyToGlass('new assets/strow.webp', strawBox, () => {
    if (!servedSet) return;
    compositeAdd('straw');
    // tutorial only: after the straw lands, guide the player to the lemon box
    if (tutorial && !lemonAdded) {
      setTimeout(() => {
        typeBanner('Tap on the lemons.', () => {
          lemonBox.style.pointerEvents = 'auto';
          if (cueVisible()) lemonBox.classList.add('glow');
          handToLemonBox();
        });
      }, 250);
    } else if (!lemonAdded) {
      armBoxIdleNudge();            // solo/pair: re-arm — idle ~9s more → nudge the lemon box next
    }
  });
}

// player clicked the glowing lemon box → drop a lemon slice on the glass,
// then the finished drink becomes draggable to the customer
function addLemonToServed() {
  if (lemonAdded || !servedSet) return;
  if (tutorial && !strawAdded) return;   // tutorial forces straw-first (guided); solo allows either box first
  lemonAdded = true;
  cancelBoxIdleNudge();             // player acted — drop any pending idle nudge
  hideHand();                       // lemon tapped — clear the lemon-box hand cue
  lemonBox.classList.remove('glow');
  lemonBox.style.pointerEvents = 'none';
  popSound();                       // a lemon lifts out of the box

  // lemon flies from the box into the glass, then the composite lands
  flyToGlass('new assets/lemon.svg', lemonBox, () => {
    if (!servedSet) return;
    compositeAdd('lemon');
    if (!strawAdded && !tutorial) armBoxIdleNudge();   // lemon-first: re-arm to nudge the straw box next
  });
}

function clearServed() {
  hideDragGhost();
  cancelBoxIdleNudge();
  if (servedSet) { servedSet.remove(); servedSet = null; }
  strawBox.classList.remove('glow'); strawBox.style.pointerEvents = 'none';
  lemonBox.classList.remove('glow'); lemonBox.style.pointerEvents = 'none';
  strawAdded = false; lemonAdded = false;
}

// ── drag the finished drink onto the customer to serve them ──
let dragActive = false, dragStartX = 0, dragStartY = 0;

function enableServeDrag() {
  if (!servedSet) return;
  wrongDropCount = 0;                                        // fresh drink → reset the wrong-drop hint counter
  servedSet.addEventListener('pointerdown', onServeDown);   // armed, but inert until 'draggable' is set
  if (tutorial) {
    // tutorial: dragging unlocks with the dragon's instruction; a ghost glass shows the way
    typeBanner('Drag the juice to the customer.', () => {
      if (!servedSet) return;
      servedSet.classList.add('draggable');     // unlock dragging in sync with the instruction
      if (cueVisible()) { servedSet.classList.add('hintBob'); showDragGhost(); }
    });
  } else {
    // solo rounds: the dragon is gone — unlock dragging immediately, no waiting
    servedSet.classList.add('draggable');
    servedSet.classList.add('hintBob');
    showDragGhost();
  }
}

// a faint, semi-transparent clone of the finished glass that drifts from the
// tray toward the customer on a loop — the "guided forward" drag hint
let dragGhostEl = null;
function showDragGhost() {
  hideDragGhost();
  if (!servedSet) return;
  const ghost = servedSet.cloneNode(true);   // same drink (glass + straw + lemon), at the same spot
  ghost.classList.remove('draggable', 'hintBob');
  ghost.classList.add('dragGhost');
  gcEl.appendChild(ghost);
  dragGhostEl = ghost;
}
function hideDragGhost() {
  if (dragGhostEl) { dragGhostEl.remove(); dragGhostEl = null; }
}

function onServeDown(e) {
  if (!lemonAdded || !servedSet) return;
  e.preventDefault();
  dragActive = true;
  hideHand();                       // player grabbed the glass
  hideDragGhost();                  // grabbed — stop the drag hint
  clearVoiceQueue();                // stop the "Drag…" narration
  if (bannerEl) bannerEl.classList.remove('show');   // hide the dialogue box once dragging starts
  servedSet.classList.remove('hintBob');
  servedSet.style.transition = 'none';
  dragStartX = e.clientX; dragStartY = e.clientY;
  try { servedSet.setPointerCapture(e.pointerId); } catch (err) {}
  servedSet.addEventListener('pointermove', onServeMove);
  servedSet.addEventListener('pointerup', onServeUp);
}

function onServeMove(e) {
  if (!dragActive) return;
  servedSet.style.transform = `translate(${e.clientX - dragStartX}px, ${e.clientY - dragStartY}px)`;
}

function onServeUp(e) {
  if (!dragActive) return;
  dragActive = false;
  servedSet.removeEventListener('pointermove', onServeMove);
  servedSet.removeEventListener('pointerup', onServeUp);

  if (pairMode) { dropOnPair(e); return; }

  const c = clientEl.getBoundingClientRect();
  const onClient = e.clientX >= c.left && e.clientX <= c.right &&
                   e.clientY >= c.top  && e.clientY <= c.bottom;
  if (onClient) {
    deliverToCustomer();
  } else {
    // wrong drop (missed the ghost) → jump sound + a little "no" shake on the customer
    try { jumpSound.currentTime = 0; jumpSound.play().catch(() => {}); } catch (err) {}
    shakeEl(clientEl);
    servedSet.style.transition = 'transform 0.3s ease';
    servedSet.style.transform = 'translate(0,0)';   // snap back to the tray
    const s = servedSet;
    setTimeout(() => {                               // then a gentle wiggle — soft "try again" cue
      if (!s || s !== servedSet) return;
      s.style.transition = '';
      s.classList.add('wiggle');
      setTimeout(() => { if (s) s.classList.remove('wiggle'); }, 520);
    }, 300);
  }
}

function deliverToCustomer() {
  hideHand();
  clearVoiceQueue();                                  // stop the "Drag…" narration
  if (bannerEl) bannerEl.classList.remove('show');    // dialogue box disappears immediately on drop
  hideThought();                                      // remove the customer's order (glass) bubble
  phase = 'leaving';
  const isGhost = (ROUNDS[level].skin === 'ghost');

  // the drink is handed over → it flies to the ghost's mouth, they drink, glass disappears
  playDrinkAnim(servedSet, clientEl);
  servedSet = null;
  try { serveSound.currentTime = 0; serveSound.play().catch(() => {}); } catch (e) {}   // cash-register on delivery

  // once the drink is finished → cheer + coins, then the ghost floats out to the left
  setTimeout(() => {
    clientEl.classList.remove('cheer'); void clientEl.offsetWidth; clientEl.classList.add('cheer');
    rewardCoins(clientEl);                             // the ghost gives coins as a reward
    setTimeout(() => {
      if (isGhost) { clientEl.src = 'new assets/ghost.webp'; clientEl.style.height = ''; }
      clientEl.classList.remove('arriving', 'cheer');
      void clientEl.offsetWidth;
      clientEl.classList.add('leavingLeft');
    }, 700);
  }, 1050);

  // end of the guided tutorial — say the final line; once its narration finishes,
  // the dragon host slides off to the right and its dialogue box is removed.
  if (tutorial) {
    setTimeout(() => {
      typeBanner('Now, it is your turn!', null, () => {   // ("Good luck!" line removed)
        dragonExit();
        setTimeout(nextRound, 1300);   // after the dragon leaves → single-client rounds, then pairs
      });
    }, 1500);
  } else {
    setTimeout(nextRound, 2000);
  }
}

// ── check ─────────────────────────────────────────────────────
function check() {
  if (!hasPoured || phase !== 'play') return;
  if (pairMode) { checkPair(); return; }
  phase = 'done';
  checkBtn.disabled = true;
  hideHand();                       // check tapped — remove the hand nudge
  clearVoiceQueue();                // check tapped — skip the "Tap the Check button." narration
  if (bannerEl) bannerEl.classList.remove('show');

  const r = ROUNDS[level];
  const correct = r.target === 'half'
    ? fillPct >= HALF_MIN && fillPct <= HALF_MAX
    : fillPct >= FULL_MIN;

  correct ? onSuccess(r) : onFail(r);
}

function onSuccess(r) {
  // tutorial shows no success line (scene removed); solo rounds still congratulate
  if (!tutorial) {
    typeBanner(r.target === 'full'
      ? 'Yay! You poured a full glass. 🎉'
      : 'Yay! You poured a Half Full glass. 🎉');
  }
  try { bonusSound.currentTime = 0; bonusSound.play().catch(() => {}); } catch (e) {}   // correct! bonus sound
  wrongCheckCount = 0;             // fresh order → the wrong-attempt streak resets

  clientEl.classList.remove('cheer');
  void clientEl.offsetWidth;
  clientEl.classList.add('cheer');

  // correct! stars burst on the machine glass, it glows, then flies onto the tray
  glassEl.classList.remove('wrong');
  void glassEl.offsetWidth;
  glassEl.classList.add('glow');
  spawnRewardStars();             // star burst on the machine glass (full OR half — any correct fill)
  setTimeout(serveToTray, 700);   // glow pulse → glass slides onto the tray, then the straw box glows for a tap
}

function onFail(r) {
  playWrongSound();
  glassEl.classList.remove('wrong');
  void glassEl.offsetWidth;
  glassEl.classList.add('wrong');     // red glow + shake
  typeBanner(r.target === 'full' ? 'Uh-oh! Is the glass Full? 🤔'
                                 : 'Uh-oh! Is the glass Half Full? 🤔');
  wrongCheckCount++;
  if (wrongCheckCount >= 2) triggerWrongHint(r.target, thoughtEl);   // 2+ wrong → glow bubble, dragon tip, hand
  setTimeout(tryAgain, 2200);
}

function tryAgain() {
  fillPct = 0; hasPoured = false; phase = 'play';
  glassEl.classList.remove('wrong');
  setJuice(0);
  checkBtn.style.display = 'none';   // hidden again until they pour
  checkBtn.disabled = true;
  // while the wrong-hint is playing, the hint owns POUR + the hand: keep pouring
  // LOCKED so the dragon can finish its line uninterrupted, and don't cue a hand.
  // The hint re-enables POUR and shows the hand once the dragon has fully exited.
  if (hintActive) { pourBtn.disabled = true; return; }
  pourBtn.disabled = false;          // re-enable pouring immediately
  if (pairMode) armPourNudge(); else showPourHand();   // customer mode: nudge only after ~11s idle
}

function nextRound() {
  if (pairMode) { startPair(); return; }            // already in two-client mode → next pair
  if (!tutorial) singleDone++;                      // a single-client round just finished
  if (singleDone >= SINGLE_ROUNDS) { enterPairMode(); return; }   // single phase done → two-client mode
  level = (level + 1) % ROUNDS.length;              // next single client
  initRound();
}

// ── two-client mode ───────────────────────────────────────────
// entered once, right after the tutorial host dragon leaves
function enterPairMode() {
  pairMode = true;
  dragonGone = true;
  tutorial = false;
  // fresh cycle: each customer once as HALF, then once as FULL; game ends when it's done
  lastSpawnSkin = null;
  customerOrder = buildCustomerOrder();
  qIndex = 0;
  startPair();
}

// the current drink's level from its fill (null = ambiguous, not a clean full/half)
function drinkLevel() {
  if (fillPct >= FULL_MIN) return 'full';
  if (fillPct >= HALF_MIN && fillPct <= HALF_MAX) return 'half';
  return null;
}

// ── customer sequence ─────────────────────────────────────────
// Every customer appears TWICE per cycle: first asking for a HALF glass, then
// (later) returning for a FULL glass. All HALF visits come first, then all FULL
// visits — each phase shuffled — so a customer's full-glass return is always later.
let customerOrder = [];     // the cycle's visits (5 HALF then 5 FULL), built once
let qIndex = 0;             // position in the sequence
let lastSpawnSkin = null;   // avoid the same customer appearing back-to-back at seams
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function buildCustomerOrder() {
  // each customer has two pending visits — a HALF first, then a FULL.
  // randomly interleave the customers so the ORDER TYPES come out mixed
  // (e.g. half, half, full, half, full…) instead of all halves then all fulls.
  const pending = PAIR_CLIENTS.map(c => ({ skin: c.skin, img: c.img, queue: ['half', 'full'] }));
  const seq = [];
  let prevSkin = null;
  while (pending.some(p => p.queue.length)) {
    let cands = pending.filter(p => p.queue.length && p.skin !== prevSkin);   // not the same customer twice in a row
    if (!cands.length) cands = pending.filter(p => p.queue.length);
    const p = cands[Math.floor(Math.random() * cands.length)];
    seq.push({ skin: p.skin, img: p.img, target: p.queue.shift() });          // shift → HALF before FULL
    prevSkin = p.skin;
  }
  return seq;
}
function nextCustomerData() {
  if (qIndex >= customerOrder.length) return null;   // cycle complete → no more customers
  return customerOrder[qIndex++];
}

// ── customer spawning (timed; ramps up; never more than MAX_CUSTOMERS on screen) ──
function spawnInterval() {
  // gradually faster: ~5.5s for the first gap, shrinking ~700ms each spawn, floored at 2.2s
  return Math.max(2200, 5500 - spawnCount * 700);
}
function scheduleSpawn() {
  if (spawnTimer) clearTimeout(spawnTimer);
  spawnTimer = setTimeout(trySpawn, spawnInterval());
}
function trySpawn() {
  spawnTimer = null;
  if (!pairMode) return;
  if (qIndex >= customerOrder.length) return;        // no more customers to bring in → stop spawning
  if (queue.length < MAX_CUSTOMERS) {
    const data = nextCustomerData();
    if (data) { addCustomer(data); spawnCount++; }
  }
  scheduleSpawn();                                   // keep arriving (faster); waits while the line is full
}

// a free DOM lane = one not held by a queued customer and not still walking off
function freeLane() {
  for (let i = 0; i < LANES.length; i++) {
    if (queue.some(c => c.lane === i)) continue;
    if (busyLanes.indexOf(i) !== -1) continue;
    return i;
  }
  return -1;
}

// the active customer is always the FRONT of the line
function activeCustomer() { return queue[0] || null; }

// show only the front customer's order bubble; the rest wait silently in line
function refreshActive() {
  queue.forEach((c, i) => {
    const b = document.getElementById(LANES[c.lane].bubbleId);
    if (!b) return;
    if (i === 0 && c.walkedIn && !c.served) b.classList.add('show');
    else b.classList.remove('show');
  });
  return queue[0] || null;
}

// slide every queued customer (and their bubble) to their current spot in line
function repositionQueue() {
  queue.forEach((c, i) => {
    const pos = QUEUE_POS[i];
    const el = LANES[c.lane].el;
    const b = document.getElementById(LANES[c.lane].bubbleId);
    el.style.transition = 'left 0.7s ease';
    el.style.left = pos.left;
    if (b) { b.style.transition = 'left 0.7s ease'; placeBubble(b, pos, c.skin); }
    setTimeout(() => { el.style.transition = ''; if (b) b.style.transition = ''; }, 750);
  });
}

// a new customer walks in at the BACK of the line (never ahead of anyone)
function addCustomer(data) {
  if (!data) return;
  const lane = freeLane();
  if (lane === -1) return;
  const index = queue.length;          // joins at the back
  const pos = QUEUE_POS[index];
  const L = LANES[lane], el = L.el;
  el.className = data.skin;
  el.style.transition = 'none';
  el.style.display = 'block';
  el.style.opacity = '1';
  el.style.height  = '';
  el.style.zIndex  = '';
  el.style.left    = pos.left;
  el.src = data.img;
  void el.offsetWidth;
  const bg = document.getElementById(L.bgId);
  const inner = document.getElementById(L.innerId);
  const bubble = document.getElementById(L.bubbleId);
  if (bg) bg.src = (data.target === 'half') ? 'new assets/dailoge box for half glass.svg'
                                            : 'new assets/dailoge box.svg';
  if (inner) inner.textContent = '';
  if (bubble) { bubble.style.transition = 'none'; placeBubble(bubble, pos, data.skin); bubble.classList.remove('show'); }
  el.classList.add('arriving');        // walk in from the right
  const cust = { lane, target: data.target, skin: data.skin, served: false, walkedIn: false };
  queue.push(cust);
  // when the customer has fully WALKED IN and stopped (ghostWalkIn is 2.8s), mark it ready;
  // its order dialogue box opens only if it's the front of the line
  setTimeout(() => {
    if (queue.indexOf(cust) === -1) return;
    cust.walkedIn = true;
    if (queue[0] === cust) popSound();
    refreshActive();
  }, 2800);
}

// Check pressed: the glass must match the ACTIVE (first-in-line) customer's order.
function checkPair() {
  phase = 'done';
  checkBtn.disabled = true;
  hideHand();
  const active = activeCustomer();
  const lvl  = drinkLevel();                 // 'full' | 'half' | null (ambiguous fill)
  const want = active ? active.target : null;
  if (!lvl || lvl !== want) {
    // wrong order (or ambiguous fill) → don't place it; red-glow error shake, then re-pour
    playWrongSound();
    glassEl.classList.remove('wrong'); void glassEl.offsetWidth; glassEl.classList.add('wrong');
    wrongCheckCount++;
    if (wrongCheckCount >= 2 && active) {
      const bubbleEl = document.getElementById(LANES[active.lane].bubbleId);
      triggerWrongHint(want, bubbleEl);   // 2+ wrong → glow bubble, dragon tip, hand
    }
    setTimeout(tryAgain, 1500);
    return;
  }
  // correct → stars burst on the machine glass, it glows, then flies onto the tray
  servedLevel = lvl;
  wrongCheckCount = 0;             // fresh order → the wrong-attempt streak resets
  try { bonusSound.currentTime = 0; bonusSound.play().catch(() => {}); } catch (e) {}
  glassEl.classList.remove('wrong');
  void glassEl.offsetWidth;
  glassEl.classList.add('glow');

  setTimeout(serveToTray, 700);   // glow pulse → glass flies onto the tray

// a little "no" shake — driven by WAAPI so it overlays the customer's float animation
// without restarting it (toggling a CSS class would re-trigger the walk-in animation)
function shakeEl(el) {
  if (!el) return;
  el.animate([
    { transform: 'translateX(-50%) rotate(0deg)'  },
    { transform: 'translateX(-53%) rotate(-4deg)' },
    { transform: 'translateX(-47%) rotate(4deg)'  },
    { transform: 'translateX(-52%) rotate(-3deg)' },
    { transform: 'translateX(-48%) rotate(2deg)'  },
    { transform: 'translateX(-50%) rotate(0deg)'  }
  ], { duration: 460, easing: 'ease-in-out' });
}
// shake whichever customer sits under the drop point (wrong drop); fall back to the front
function shakeCustomerAt(e) {
  let target = null;
  for (let i = 0; i < queue.length; i++) {
    const el = LANES[queue[i].lane].el;
    const b = el.getBoundingClientRect();
    if (e.clientX >= b.left && e.clientX <= b.right && e.clientY >= b.top && e.clientY <= b.bottom) { target = el; break; }
  }
  if (!target && queue[0]) target = LANES[queue[0].lane].el;
  shakeEl(target);
}

// drop the finished drink onto the active (first-in-line) customer
let wrongDropCount = 0;   // consecutive wrong drops → after 2, show the ghost drag hint
function dropOnPair(e) {
  const active = activeCustomer();   // the front of the line — the only one being served
  if (!active) { servedSet.style.transition = 'transform 0.3s ease'; servedSet.style.transform = 'translate(0,0)'; return; }
  const r = LANES[active.lane].el.getBoundingClientRect();
  const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
  if (over) { wrongDropCount = 0; serveCustomer(active); return; }   // correct target → reset the counter
  // ── WRONG drop (off the active customer) ──
  wrongDropCount++;
  try { jumpSound.currentTime = 0; jumpSound.play().catch(() => {}); } catch (err) {}   // wrong-drop sound
  shakeCustomerAt(e);               // the customer that got the wrong drink shakes "no"
  // dropped off the customer → snap back with a gentle wiggle, stay draggable so they can aim again
  servedSet.classList.add('wrongDrop');
  servedSet.style.transition = 'transform 0.3s ease';
  servedSet.style.transform  = 'translate(0,0)';
  const s = servedSet;
  setTimeout(() => {                                  // after the snap home, do the wiggle
    if (!s || s !== servedSet) return;
    s.style.transition = '';
    s.classList.add('wiggle');
    setTimeout(() => {
      if (!s || s !== servedSet) return;
      s.classList.remove('wiggle', 'wrongDrop');
      // 2+ wrong drops in a row → show the ghost glass drifting to the customer as a hint
      if (wrongDropCount >= 2) { s.classList.add('hintBob'); showDragGhost(); }
    }, 520);
  }, 300);
}

// the made drink matches no remaining client → fade it out and reset for a fresh pour
function discardDrinkAndRepour() {
  playWrongSound();
  if (servedSet) servedSet.classList.add('wrongDrop');

  setTimeout(() => {
    if (servedSet) { servedSet.remove(); servedSet = null; }

  }, 600);
}

// coin reward: the coins.svg pile magically appears on the counter in front of the
// served customer, holds ~2 seconds, then fades out smoothly.
function rewardCoins(fromEl) {
  const pile = document.getElementById('coinPile');
  if (!pile) return;
  // fixed spot on the counter ledge (position/size come from CSS — matches the reference)
  clearTimeout(pile._hold); clearTimeout(pile._gone);
  pile.classList.remove('fadeOut');
  pile.style.display = 'block';
  void pile.offsetWidth;
  pile.classList.add('landIn');                     // magical materialise
  pile._hold = setTimeout(() => {                   // hold ~0.9 seconds…
    pile.classList.remove('landIn');
    pile.classList.add('fadeOut');                  // …then smooth magical fade-out
    try { coinsGoneSound.currentTime = 0; coinsGoneSound.play().catch(() => {}); } catch (e) {}   // coins vanish sound
    pile._gone = setTimeout(() => { pile.style.display = 'none'; pile.classList.remove('fadeOut'); }, 720);
  }, 900);
}

// the delivered drink flies up to the customer's mouth, tilts to "drink", then vanishes
function playDrinkAnim(drink, customerEl) {
  if (!drink) return;
  drink.removeEventListener('pointerdown', onServeDown);
  drink.classList.remove('hintBob', 'draggable');
  drink.style.transition = 'none';
  const prev = drink.style.transform || 'translate(0px, 0px)';   // the drop position (from dragging)

  // work out the translate that brings the glass up to the customer's mouth/face
  let mouth = prev;
  if (customerEl) {
    const gr = gcEl.getBoundingClientRect();
    const m  = /translate\(\s*([-\d.]+)px\s*,\s*([-\d.]+)px\s*\)/.exec(prev);
    const tx = m ? parseFloat(m[1]) : 0, ty = m ? parseFloat(m[2]) : 0;
    const cur = drink.getBoundingClientRect();                    // current (dropped) position
    const restCx  = cur.left + cur.width / 2 - gr.left - tx;      // glass centre at rest (no transform)
    const restTop = cur.top - gr.top - ty;
    const cr = customerEl.getBoundingClientRect();
    const targetCx = cr.left + cr.width / 2 - gr.left;            // customer centre-x
    const targetY  = cr.top - gr.top + cr.height * 0.28;          // mouth/face height on the sprite
    mouth = 'translate(' + (targetCx - restCx).toFixed(0) + 'px,' + (targetY - restTop).toFixed(0) + 'px)';
  }

  drink.animate([
    { transform: prev  + ' rotate(0deg) scale(1)',                        opacity: 1, offset: 0    },
    { transform: mouth + ' rotate(0deg) scale(0.8)',                      opacity: 1, offset: 0.32 },  // flew up to the mouth (smaller)
    { transform: mouth + ' translateY(-5%) rotate(-26deg) scale(0.8)',    opacity: 1, offset: 0.60 },  // tilt back to drink
    { transform: mouth + ' translateY(-7%) rotate(-30deg) scale(0.8)',    opacity: 1, offset: 0.82 },
    { transform: mouth + ' translateY(-10%) rotate(-34deg) scale(0.45)',  opacity: 0, offset: 1  }     // emptied → gone
  ], { duration: 1050, easing: 'ease-in-out', fill: 'forwards' });
  setTimeout(() => { if (drink) drink.remove(); }, 1080);   // gone once emptied
}

// the front customer got their juice → drink, cheer, walk off; the line shifts forward
function serveCustomer(c) {
  if (c !== queue[0]) return;                          // only the front is ever served
  hideHand();
  hideDragGhost();
  c.served = true;
  const L = LANES[c.lane];
  const fb = document.getElementById(L.bubbleId);
  if (fb) fb.classList.remove('show');                 // order fulfilled — bubble away

  // hand over the drink → it flies to the customer's mouth, they drink, glass disappears
  const el = L.el, leftLane = c.lane;
  playDrinkAnim(servedSet, el);
  servedSet = null;
  try { serveSound.currentTime = 0; serveSound.play().catch(() => {}); } catch (e) {}   // cash-register on delivery
  busyLanes.push(leftLane);
  // reset the finishing boxes; lock the bar for the whole serve → exit beat
  strawBox.classList.remove('glow'); strawBox.style.pointerEvents = 'none';
  lemonBox.classList.remove('glow'); lemonBox.style.pointerEvents = 'none';
  strawAdded = false; lemonAdded = false; servedLevel = null;
  checkBtn.style.display = 'none'; checkBtn.disabled = true;
  pourBtn.disabled = true;
  phase = 'leaving';

  // full sequence, in order: drink → cheer + coins → walk off → ONLY THEN advance the
  // line. The served customer stays in the queue (holding its lane) until it has fully
  // exited, so the next customer never moves into / overlaps the serving spot.
  setTimeout(() => {                                   // drink finished (~1.05s) → cheer + coins
    el.classList.remove('cheer'); void el.offsetWidth; el.classList.add('cheer');
    rewardCoins(el);                                   // coins appear on the counter in front of the customer
    setTimeout(() => {                                 // then walk off to the left
      el.classList.remove('standing', 'arriving', 'cheer'); void el.offsetWidth;
      el.classList.add('leavingLeft');                 // walk off-screen left
      setTimeout(() => {                               // fully off-screen → free the lane, THEN advance
        el.style.display = 'none'; el.classList.remove('leavingLeft');
        const bi = busyLanes.indexOf(leftLane); if (bi !== -1) busyLanes.splice(bi, 1);

        queue.shift();                                 // remove the served front now that it has gone
        repositionQueue();                             // the rest slide forward into the empty spots

        // all customers served and none left to spawn → the cycle is complete
        if (qIndex >= customerOrder.length && queue.length === 0) {
          phase = 'gameover';
          setTimeout(endGame, 1100);
          return;
        }
        // the new front steps up → open its order box and re-enable pouring
        setTimeout(() => {
          fillPct = 0; setJuice(0); hasPoured = false; phase = 'play';
          refreshActive();                 // the new front opens its dialogue box
          pourBtn.disabled = false; armPourNudge();   // nudge only after ~11s idle
        }, 750);
      }, 1000);
    }, 500);
  }, 1050);
}

// ── end-screen confetti (carnival colours, rains over the celebration video) ──
const CONFETTI_COLORS = ['#FF7ED8', '#CE9EFF', '#FFD84D', '#7FE0FF', '#FF9E5A', '#FFFFFF', '#8BE78B'];
let confettiTimer = null;
function makeConfettiPiece() {
  const box = document.getElementById('confetti');
  if (!box) return;
  const p = document.createElement('div');
  p.className = 'confettiPiece';
  const w = 0.7 + Math.random() * 0.9;                 // % width
  p.style.width = w + '%';
  p.style.left = (Math.random() * 100) + '%';
  p.style.background = CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0];
  p.style.borderRadius = (Math.random() < 0.4) ? '50%' : '2px';   // mix of dots and flakes
  p.style.setProperty('--dx', ((Math.random() * 2 - 1) * 90).toFixed(0) + 'px');   // gentle sway

  box.appendChild(p);
  setTimeout(() => p.remove(), dur * 1000 + 120);
}
function startConfetti() {
  stopConfetti();
  for (let i = 0; i < 40; i++) setTimeout(makeConfettiPiece, Math.random() * 700);   // opening burst
  confettiTimer = setInterval(() => { for (let i = 0; i < 6; i++) makeConfettiPiece(); }, 320);   // steady rain
}
function stopConfetti() {
  if (confettiTimer) { clearInterval(confettiTimer); confettiTimer = null; }
  const box = document.getElementById('confetti');
  if (box) box.innerHTML = '';
}

  queue = []; busyLanes = [];
  pourBtn.disabled = true;

  const end = document.getElementById('gameEnd');
  if (end) end.classList.add('show');
  startConfetti();                                   // celebratory confetti over the video

  // play the celebration video; when it finishes → back to the title screen
  stopGameMusic();                                   // the video has its own audio

    v.currentTime = 0;

      v.muted = true;
      v.play().catch(() => setTimeout(restartGame, 1500));
    });
  } else {

  }
}

  if (thoughtBg) thoughtBg.src = (r.target === 'half')
    ? 'new assets/dailoge box for half glass.svg'
    : 'new assets/dailoge box.svg';
  thoughtEl.classList.add('show');
}

// force the guiding hand to a spot (bypasses the cue-visible gate used in play)
function devHand(left, top, drag) {
  handEl.style.left = left; handEl.style.top = top;
  handEl.classList.toggle('dragHint', !!drag);
  handEl.style.display = 'block';
}

function devTargetPct(r) { return (r.target === 'half') ? 50 : 100; }

// ① empty glass, ready to pour
function devToPour(n) {
  devSetupScene(n);
  pourBtn.disabled = false;
  showPourHand();
}

// ② glass filled to the round's target, Check button ready
function devToCheck(n) {
  devSetupScene(n);
  const r = ROUNDS[level];
  fillPct = devTargetPct(r); hasPoured = true;
  setJuice(fillPct);
  pourBtn.disabled = (fillPct >= 100);
  checkBtn.style.display = 'block';
  checkBtn.disabled = false;
  devHand('61%', '90%');
}

// ③ filled glass served on the tray, straw step available
function devToTray(n) {
  devSetupScene(n);
  const r = ROUNDS[level];
  fillPct = devTargetPct(r); hasPoured = true;
  setJuice(fillPct);
  serveToTray();                       // clone the filled glass onto the tray
  strawAdded = false; lemonAdded = false;
  strawBox.style.pointerEvents = 'auto'; strawBox.classList.add('glow');
  lemonBox.style.pointerEvents = 'auto'; lemonBox.classList.add('glow');
  devHand('50%', '60%');
}

// ④ finished drink (straw + lemon) on the tray, draggable to the customer
function devToServe(n) {
  devSetupScene(n);
  const r = ROUNDS[level];
  fillPct = devTargetPct(r); hasPoured = true;
  setJuice(fillPct);
  serveToTray();
  // fast-forward the straw/lemon mini-steps to a finished, draggable drink
  strawAdded = true; lemonAdded = true;
  strawBox.classList.remove('glow'); strawBox.style.pointerEvents = 'none';
  lemonBox.classList.remove('glow'); lemonBox.style.pointerEvents = 'none';
  if (servedSet) {
    const g = servedSet.querySelector('.glassImg');
    if (g) g.style.visibility = 'hidden';   // composite depicts the whole glass — hide the plain one
    const img = document.createElement('img');
    img.className = 'compositeImg';
    img.src = (COMPOSITES[r.target] || COMPOSITES.full).complete;
    servedSet.appendChild(img);
    servedSet.addEventListener('pointerdown', onServeDown);
    servedSet.classList.add('draggable');
  }
  devHand('60%', '74%', true);
}

function buildDevMenu() {
  const list = document.getElementById('devList');
  if (!list) return;
  list.innerHTML = '';
  const close = () => list.classList.remove('open');
  const addBtn = (parent, label, fn, cls) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (cls) b.className = cls;
    b.onclick = (e) => { e.stopPropagation(); fn(); };
    parent.appendChild(b);
    return b;
  };

  // global controls
  addBtn(list, '🏠 Title screen', () => { devGoToTitle(); close(); });
  addBtn(list, '👥 Customer mode (up to 3)', () => {
    devResetScene();
    titleDone = true;
    const t = document.getElementById('title'); if (t) t.style.display = 'none';
    if (dragonEl) dragonEl.style.display = 'none';
    enterPairMode();
    close();
  });
  addBtn(list, '🏁 End screen', () => { devGoToEnd(); close(); });
  const skipBtn = addBtn(list, '', () => {});
  const paintSkip = () => {
    skipBtn.textContent = '⚡ Skip dialogue: ' + (skipDialogue ? 'ON' : 'OFF');
    skipBtn.classList.toggle('on', skipDialogue);
  };
  skipBtn.onclick = (e) => { e.stopPropagation(); skipDialogue = !skipDialogue; paintSkip(); };
  paintSkip();

  // one collapsible group per round, each with quick-jump states
  ROUNDS.forEach((r, i) => {
    const group = document.createElement('div');
    group.className = 'devGroup';
    addBtn(group, '▶ Round ' + (i + 1) + ' — ' + r.skin + ' (' + r.label + ')  ▸',
           () => group.classList.toggle('open'), 'devHead');
    const sub = document.createElement('div');
    sub.className = 'devSub';
    addBtn(sub, '↪ Play from start',         () => { devGoToRound(i); close(); });
    addBtn(sub, '① Empty glass — pour',      () => { devToPour(i);    close(); });
    addBtn(sub, '② Filled — Check',          () => { devToCheck(i);   close(); });
    addBtn(sub, '③ On tray — straw/lemon',   () => { devToTray(i);    close(); });
    addBtn(sub, '④ Ready to serve (drag)',   () => { devToServe(i);   close(); });
    group.appendChild(sub);
    list.appendChild(group);
  });
}
buildDevMenu();
// ════ end DEV screen switcher ════

// ── boot ──────────────────────────────────────────────────────
initRound();
</script>
